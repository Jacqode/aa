<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stats v94</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-top:30px}
  table{border-collapse:collapse;width:100%;margin-top:10px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f5f5f5}
  .small{font-size:.9rem;color:#666}
</style>
</head>
<body>

<h1>Stats v94</h1>
<p class="small">Statistik for det team, der står i URL’en.</p>

<!-- ⭐ Team info -->
<h2>Team</h2>
<div id="teamName" style="font-weight:600;font-size:18px;margin-bottom:4px"></div>
<div id="lastUpdated" class="small" style="margin-bottom:20px"></div>

<!-- ⭐ Dine stats -->
<h2>Dine stats</h2>
<div id="yourStats" style="font-size:16px;line-height:1.6"></div>

<!-- ⭐ Team – seneste energizer pr. bruger -->
<h2>Dit teams stats – seneste energizer pr. bruger</h2>
<table id="usersTable">
  <thead>
    <tr>
      <th>Navn</th>
      <th>Device</th>
      <th>Øvelse</th>
      <th>Tidspunkt</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ⭐ Team feed -->
<h2>Team feed (alle events)</h2>
<table id="feedTable">
  <thead>
    <tr>
      <th>Navn</th>
      <th>Device</th>
      <th>Øvelse</th>
      <th>Varighed</th>
      <th>Tidspunkt</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;
const team = new URLSearchParams(location.search).get("team") || "default";
document.getElementById("teamName").textContent = "Team: " + team;

// ⭐ Dit navn og device fra localStorage
const yourName = localStorage.name || "Ukendt";
const yourDevice = localStorage.device_id || "Ukendt";

/* ⭐ Hent feed */
async function loadFeed(){
  const res = await fetch(api(`/feed?team=${team}`));
  const data = await res.json();
  const feed = data.feed || [];

  /* ⭐ Last updated */
  if(feed.length > 0){
    const newest = feed.sort((a,b)=>b.ts - a.ts)[0];
    const d = new Date(newest.ts * 1000);
    document.getElementById("lastUpdated").textContent =
      "Last updated: " + d.toLocaleString("da-DK");
  } else {
    document.getElementById("lastUpdated").textContent = "Last updated: Ingen data";
  }

  /* ⭐ Dine stats */
  const yourEvents = feed.filter(e => e.device_id === yourDevice);
  const yourCount = yourEvents.length;
  const yourLast = yourEvents.sort((a,b)=>b.ts-a.ts)[0];

  document.getElementById("yourStats").innerHTML = `
    <b>Navn:</b> ${yourName}<br>
    <b>Device:</b> ${yourDevice}<br>
    <b>Antal energizers:</b> ${yourCount}<br>
    <b>Seneste:</b> ${
      yourLast
        ? `${yourLast.exercise} (${new Date(yourLast.ts*1000).toLocaleString("da-DK")})`
        : "Ingen endnu"
    }
  `;

  /* ⭐ Team – seneste pr. bruger */
  const latest = {};
  feed.forEach(i=>{
    const ts = +i.ts * 1000;
    if(!latest[i.device_id] || ts > latest[i.device_id].ts){
      latest[i.device_id] = {...i, ts};
    }
  });

  const usersTable = document.querySelector("#usersTable tbody");
  usersTable.innerHTML = "";

  Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.device_id}</td>
        <td>${i.exercise}</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      usersTable.appendChild(row);
    });

  /* ⭐ Team feed (alle events) */
  const feedTable = document.querySelector("#feedTable tbody");
  feedTable.innerHTML = "";

  feed
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts * 1000);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.device_id}</td>
        <td>${i.exercise}</td>
        <td>${i.duration} sek</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      feedTable.appendChild(row);
    });
}

/* ⭐ Start */
loadFeed();
setInterval(loadFeed, 5000);
</script>

</body>
</html>
