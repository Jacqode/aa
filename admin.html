<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus Admin</title>
<style>
body{font-family:system-ui;padding:20px;max-width:600px}
input,button{padding:8px;font-size:1rem;margin-top:8px}
#invites{margin-top:20px}
.inv{padding:6px 0;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<h2>Admin – Invite generator</h2>

<label>Navn</label><br>
<input id="name" placeholder="Indtast navn">

<br><br>

<label>Team ID</label><br>
<input id="team" placeholder="TEAM123" value="TEAM123">

<br><br>

<button id="gen">Generér invite-link</button>

<div id="out" style="margin-top:20px"></div>

<hr style="margin:30px 0">

<h2>Eksisterende invites</h2>
<div id="invites">Indlæser…</div>

<script>
const BASE="https://workerff092.jakobhelkjaer.workers.dev";

// --- Opret invite ---
document.getElementById("gen").onclick = async () => {
  const name=document.getElementById("name").value.trim();
  const team=document.getElementById("team").value.trim();

  if(!name || !team){
    document.getElementById("out").textContent="Udfyld begge felter.";
    return;
  }

  const r=await fetch(BASE+"/api/invite",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({team_id:team, display_name:name})
  });

  const d=await r.json();
  document.getElementById("out").innerHTML=
    `<a href="${d.link}" target="_blank">${d.link}</a>`;

  loadInvites();
};

// --- Hent alle invites (kræver at du laver et endpoint senere) ---
async function loadInvites(){
  const r = await fetch(BASE+"/api/all_invites"); // du laver dette endpoint senere
  const rows = await r.json();

  document.getElementById("invites").innerHTML = rows.map(inv =>
    `<div class="inv">
       <strong>${inv.display_name}</strong> (${inv.team_id})<br>
       ID: ${inv.invite_id}<br>
       <button onclick="delInvite('${inv.invite_id}')">Slet</button>
     </div>`
  ).join("");
}

// --- Slet invite ---
async function delInvite(id){
  await fetch(BASE+"/api/invite?invite_id="+id,{method:"DELETE"});
  loadInvites();
}

loadInvites();
</script>

</body>
</html>
