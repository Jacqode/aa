<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus Admin v91</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-top:30px}
  button{padding:6px 12px;margin:4px;border-radius:6px;border:1px solid #ccc;cursor:pointer}
  table{border-collapse:collapse;width:100%;margin-top:10px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f5f5f5}
</style>
</head>
<body>

<h1>Flow Focus Admin</h1>
<p>Administrér teams og brugere.</p>

<!-- ⭐ TEAMS -->
<h2>Teams</h2>
<button onclick="loadTeams()">Genindlæs teams</button>
<table id="teamsTable">
  <tr><th>Team</th><th>Handling</th></tr>
</table>

<!-- ⭐ USERS -->
<h2>Brugere i valgt team</h2>
<select id="teamSelect" onchange="loadUsers()"></select>
<table id="usersTable">
  <tr><th>Navn</th><th>Handling</th></tr>
</table>

<script>
const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;

/* ⭐ Hent teams */
async function loadTeams(){
  const res = await fetch(api("/admin/teams"));
  const data = await res.json();

  const table = document.getElementById("teamsTable");
  table.innerHTML = "<tr><th>Team</th><th>Handling</th></tr>";

  const select = document.getElementById("teamSelect");
  select.innerHTML = "";

  data.teams.forEach(team=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${team.name}</td>
      <td>
        <button onclick="deleteTeam('${team.name}')">Slet team</button>
      </td>
    `;
    table.appendChild(row);

    const opt = document.createElement("option");
    opt.value = team.name;
    opt.textContent = team.name;
    select.appendChild(opt);
  });

  loadUsers();
}

/* ⭐ Slet team */
async function deleteTeam(team){
  await fetch(api("/admin/delete-team"),{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ team })
  });
  loadTeams();
}

/* ⭐ Hent brugere */
async function loadUsers(){
  const team = document.getElementById("teamSelect").value;
  if(!team) return;

  const res = await fetch(api(`/admin/users?team=${team}`));
  const data = await res.json();

  const table = document.getElementById("usersTable");
  table.innerHTML = "<tr><th>Navn</th><th>Handling</th></tr>";

  data.users.forEach(u=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${u.name}</td>
      <td>
        <button onclick="deleteUser('${team}','${u.name}')">Slet bruger</button>
      </td>
    `;
    table.appendChild(row);
  });
}

/* ⭐ Slet bruger */
async function deleteUser(team,name){
  await fetch(api("/admin/delete-user"),{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ team, name })
  });
  loadUsers();
}

/* ⭐ Start */
loadTeams();
</script>

</body>
</html>
