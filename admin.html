<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Energizer Admin v93</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-top:30px}
  table{border-collapse:collapse;width:100%;margin-top:10px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f5f5f5}
  .small{font-size:.9rem;color:#666}
  canvas{max-width:100%;margin-top:20px}
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Energizer Admin v93</h1>
<p class="small">Viser statistik og grafer for det team, der står i URL’en.</p>

<!-- ⭐ Team info -->
<h2>Team</h2>
<div id="teamName" style="font-weight:600;font-size:18px;margin-bottom:10px"></div>

<!-- ⭐ Statistik -->
<h2>Statistik</h2>
<div id="statsBox" style="font-size:16px;line-height:1.6"></div>

<!-- ⭐ Brugere -->
<h2>Brugere (seneste aktivitet)</h2>
<table id="usersTable">
  <thead>
    <tr><th>Navn</th><th>Seneste energizer</th><th>Tidspunkt</th></tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ⭐ Feed -->
<h2>Feed (alle events)</h2>
<table id="feedTable">
  <thead>
    <tr><th>Navn</th><th>Øvelse</th><th>Varighed</th><th>Tidspunkt</th></tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ⭐ Grafer -->
<h2>Graf: Aktivitet over tid</h2>
<canvas id="activityChart"></canvas>

<h2>Graf: Mest populære øvelser</h2>
<canvas id="exerciseChart"></canvas>

<script>
const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;
const team = new URLSearchParams(location.search).get("team") || "default";

document.getElementById("teamName").textContent = "Team: " + team;

let activityChart, exerciseChart;

/* ⭐ Hent feed */
async function loadFeed(){
  const res = await fetch(api(`/feed?team=${team}`));
  const data = await res.json();
  const feed = data.feed || [];

  /* ⭐ Statistik */
  const users = new Set(feed.map(e => e.name));
  const eventsToday = feed.filter(e => {
    const d = new Date(e.ts * 1000);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  });

  document.getElementById("statsBox").innerHTML = `
    <b>Antal brugere:</b> ${users.size}<br>
    <b>Antal events:</b> ${feed.length}<br>
    <b>Events i dag:</b> ${eventsToday.length}
  `;

  /* ⭐ Brugere (seneste aktivitet) */
  const latest = {};
  feed.forEach(i=>{
    const ts = +i.ts * 1000;
    if(!latest[i.name] || ts > latest[i.name].ts){
      latest[i.name] = {...i, ts};
    }
  });

  const usersTable = document.querySelector("#usersTable tbody");
  usersTable.innerHTML = "";

  Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.exercise}</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      usersTable.appendChild(row);
    });

  /* ⭐ Feed (alle events) */
  const feedTable = document.querySelector("#feedTable tbody");
  feedTable.innerHTML = "";

  feed
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts * 1000);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.exercise}</td>
        <td>${i.duration} sek</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      feedTable.appendChild(row);
    });

  drawActivityChart(feed);
  drawExerciseChart(feed);
}

/* ⭐ Graf: Aktivitet over tid */
function drawActivityChart(feed){
  const byDay = {};

  feed.forEach(e=>{
    const d = new Date(e.ts * 1000);
    const key = d.toLocaleDateString("da-DK");
    byDay[key] = (byDay[key] || 0) + 1;
  });

  const labels = Object.keys(byDay);
  const values = Object.values(byDay);

  if(activityChart) activityChart.destroy();

  activityChart = new Chart(document.getElementById("activityChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Events pr. dag",
        data: values,
        borderColor: "#0d6efd",
        backgroundColor: "rgba(13,110,253,0.2)",
        fill: true,
        tension: 0.3
      }]
    }
  });
}

/* ⭐ Graf: Mest populære øvelser */
function drawExerciseChart(feed){
  const counts = {};

  feed.forEach(e=>{
    counts[e.exercise] = (counts[e.exercise] || 0) + 1;
  });

  const labels = Object.keys(counts);
  const values = Object.values(counts);

  if(exerciseChart) exerciseChart.destroy();

  exerciseChart = new Chart(document.getElementById("exerciseChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Antal gange udført",
        data: values,
        backgroundColor: "#198754"
      }]
    }
  });
}

/* ⭐ Start */
loadFeed();
setInterval(loadFeed, 5000);
</script>

</body>
</html>
