<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus Admin v161 – Overblik</title>
<style>
body{font-family:system-ui;padding:16px;max-width:900px;margin:auto}
input,button{padding:8px;margin:6px 0}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
pre{background:#f6f6f6;padding:8px;overflow:auto}
.small{font-size:.9rem;color:#666}
</style>
</head>
<body>

<h2>Flow Focus Admin v161 – Overblik</h2>

<label>Team ID</label><br>
<input id="team" placeholder="fx psy" style="width:200px">

<button id="btnFeed">Hent team feed</button>
<button id="btnDevices">Hent devices</button>

<h3>Link til nye brugere</h3>
<div id="inviteLink" class="small">Indtast team for at generere link…</div>

<h3>Feed</h3>
<table id="feedTable">
<thead><tr><th>Navn</th><th>Aktivitet</th><th>Energi</th><th>Tid</th></tr></thead>
<tbody></tbody>
</table>

<h3>Devices</h3>
<table id="devicesTable">
<thead><tr><th>Device</th><th>Navn</th><th>Team</th><th>Org</th><th>Last seen</th></tr></thead>
<tbody></tbody>
</table>

<script>
const BASE = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";

function $(id){ return document.getElementById(id); }

async function fetchJson(url){
  const res = await fetch(url);
  const text = await res.text();
  try { return JSON.parse(text); } catch { return text; }
}

$("team").addEventListener("input", () => {
  const t = $("team").value.trim();
  if (!t) return $("inviteLink").textContent = "Indtast team for at generere link…";
  $("inviteLink").textContent = `https://jacqode.github.io/aa/?team=${encodeURIComponent(t)}`;
});

$("btnFeed").addEventListener("click", async () => {
  const team = $("team").value.trim();
  if (!team) return alert("Indtast team");
  const rows = await fetchJson(`${BASE}/api/team_feed?team_id=${team}&limit=200`);
  const tbody = document.querySelector("#feedTable tbody");
  tbody.innerHTML = "";
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${r.display_name||""}</td><td>${r.activity||""}</td><td>${r.energy||""}</td><td>${r.timestamp||""}</td>`;
    tbody.appendChild(tr);
  });
});

$("btnDevices").addEventListener("click", async () => {
  const team = $("team").value.trim();
  if (!team) return alert("Indtast team");
  const rows = await fetchJson(`${BASE}/api/team_feed?team_id=${team}&limit=500`);
  const devices = {};
  rows.forEach(r => {
    devices[r.device_id] = {
      device_id: r.device_id,
      display_name: r.display_name,
      team_id: r.team_id,
      org_id: r.org_id,
      last_seen: r.timestamp
    };
  });
  const tbody = document.querySelector("#devicesTable tbody");
  tbody.innerHTML = "";
  Object.values(devices).forEach(d => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${d.device_id}</td><td>${d.display_name||""}</td><td>${d.team_id||""}</td><td>${d.org_id||""}</td><td>${d.last_seen||""}</td>`;
    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>
