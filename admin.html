<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin v94</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-top:30px}
  table{border-collapse:collapse;width:100%;margin-top:10px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f5f5f5}
  .teamBtn{padding:8px 14px;margin:4px;border-radius:6px;border:1px solid #ccc;background:#fafafa;cursor:pointer}
  .teamBtn.active{background:#111;color:#fff}
</style>
</head>
<body>

<h1>Admin v94</h1>
<p style="font-size:14px;color:#666">Overblik over alle teams og alle events.</p>

<!-- ⭐ Team liste -->
<h2>Teams</h2>
<div id="teamList"></div>

<!-- ⭐ Feed for valgt team -->
<h2 id="teamTitle"></h2>
<table id="feedTable">
  <thead>
    <tr>
      <th>Navn</th>
      <th>Device</th>
      <th>Øvelse</th>
      <th>Varighed</th>
      <th>Tidspunkt</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;

/* ⭐ Hent alle teams */
async function loadTeams(){
  const res = await fetch(api("/feed?team=default")); 
  const data = await res.json();
  const feed = data.feed || [];

  // Find alle teams via DISTINCT
  const teams = [...new Set(feed.map(e => e.team_id))];

  const list = document.getElementById("teamList");
  list.innerHTML = "";

  teams.forEach(team=>{
    const btn = document.createElement("button");
    btn.textContent = team;
    btn.className = "teamBtn";
    btn.onclick = () => selectTeam(team, btn);
    list.appendChild(btn);
  });
}

/* ⭐ Hent feed for valgt team */
async function selectTeam(team, btn){
  document.querySelectorAll(".teamBtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.getElementById("teamTitle").textContent = "Feed for team: " + team;

  const res = await fetch(api(`/feed?team=${team}`));
  const data = await res.json();
  const feed = data.feed || [];

  const tbody = document.querySelector("#feedTable tbody");
  tbody.innerHTML = "";

  feed.sort((a,b)=>b.ts - a.ts).forEach(i=>{
    const d = new Date(i.ts * 1000);
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${i.name}</td>
      <td>${i.device_id}</td>
      <td>${i.exercise}</td>
      <td>${i.duration} sek</td>
      <td>${d.toLocaleString("da-DK")}</td>
    `;
    tbody.appendChild(row);
  });
}

/* ⭐ Start */
loadTeams();
</script>

</body>
</html>
