<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus Admin v152</title>

<style>
body{font-family:system-ui;padding:16px}
table{border-collapse:collapse;width:100%;margin-top:20px}
td,th{border:1px solid #ccc;padding:6px;font-size:.9rem}
.active{color:green;font-weight:bold}
.inactive{color:#999}
</style>
</head>

<body>

<h2>Admin – Devices</h2>
<div id="devices">Indlæser…</div>

<h2>Seneste aktiviteter</h2>
<div id="events">Indlæser…</div>

<script>
const p = new URLSearchParams(location.search);
const TEAM = p.get("team") || "demo";

const BASE = "https://workerff092.jakobhelkjaer.workers.dev";
const api = (p,o={}) => fetch(BASE+p,{...o,mode:"cors"}).then(r=>r.json());

function $(id){return document.getElementById(id)}

function isActive(lastSeen){
  const diff = Date.now() - new Date(lastSeen).getTime();
  return diff < 5 * 60 * 1000;
}

async function loadDevices(){
  const rows = await api(`/api/devices?team_id=${TEAM}`);

  $("devices").innerHTML = `
    <table>
      <tr>
        <th>Navn</th>
        <th>Device</th>
        <th>Sidst aktiv</th>
        <th>Status</th>
        <th></th>
      </tr>
      ${rows.map(r => `
        <tr>
          <td>${r.display_name}</td>
          <td>${r.device_id}</td>
          <td>${new Date(r.last_seen).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})}</td>
          <td class="${isActive(r.last_seen) ? "active" : "inactive"}">
            ${isActive(r.last_seen) ? "Aktiv nu" : "Offline"}
          </td>
          <td>
            <button onclick="deactivate('${r.device_id}')">Deaktiver</button>
          </td>
        </tr>
      `).join("")}
    </table>
  `;
}

async function deactivate(id){
  await api(`/api/device?device_id=${id}`, { method:"DELETE" });
  loadDevices();
}

async function loadEvents(){
  const rows = await api(`/api/team_feed?team_id=${TEAM}&limit=50`);

  $("events").innerHTML = rows.map(r =>
    `${r.display_name}: ${r.activity} kl. ${
      new Date(r.timestamp).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})
    }`
  ).join("<br>");
}

window.onload = () => {
  loadDevices();
  loadEvents();
  setInterval(loadDevices, 15000);
  setInterval(loadEvents, 15000);
};
</script>

</body>
</html>
