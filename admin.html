<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Energizer Admin v92</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-top:30px}
  table{border-collapse:collapse;width:100%;margin-top:10px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f5f5f5}
  .small{font-size:.9rem;color:#666}
</style>
</head>
<body>

<h1>Energizer Admin v92</h1>
<p class="small">Denne admin er frontend‑only og viser data for det team, der står i URL’en.</p>

<!-- ⭐ Team info -->
<h2>Team</h2>
<div id="teamName" style="font-weight:600;font-size:18px;margin-bottom:10px"></div>

<!-- ⭐ Brugere -->
<h2>Brugere (seneste aktivitet)</h2>
<table id="usersTable">
  <thead>
    <tr><th>Navn</th><th>Seneste energizer</th><th>Tidspunkt</th></tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ⭐ Feed -->
<h2>Feed (alle events)</h2>
<table id="feedTable">
  <thead>
    <tr><th>Navn</th><th>Øvelse</th><th>Varighed</th><th>Tidspunkt</th></tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;
const team = new URLSearchParams(location.search).get("team") || "default";

document.getElementById("teamName").textContent = "Team: " + team;

/* ⭐ Hent feed */
async function loadFeed(){
  const res = await fetch(api(`/feed?team=${team}`));
  const data = await res.json();
  const feed = data.feed || [];

  /* ⭐ Brugere (seneste aktivitet) */
  const latest = {};
  feed.forEach(i=>{
    const ts = +i.ts * 1000;
    if(!latest[i.name] || ts > latest[i.name].ts){
      latest[i.name] = {...i, ts};
    }
  });

  const usersTable = document.querySelector("#usersTable tbody");
  usersTable.innerHTML = "";

  Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.exercise}</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      usersTable.appendChild(row);
    });

  /* ⭐ Feed (alle events) */
  const feedTable = document.querySelector("#feedTable tbody");
  feedTable.innerHTML = "";

  feed
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i=>{
      const d = new Date(i.ts * 1000);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.name}</td>
        <td>${i.exercise}</td>
        <td>${i.duration} sek</td>
        <td>${d.toLocaleString("da-DK")}</td>
      `;
      feedTable.appendChild(row);
    });
}

/* ⭐ Start */
loadFeed();
setInterval(loadFeed, 5000);
</script>

</body>
</html>
