<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v66</title>

<style>
  body{
    font-family:system-ui;
    margin:0;
    padding:20px;
    background:#fff;
    color:#111;
  }

  .section{margin:6px 0 8px 0}

  button,input{
    padding:10px 16px;
    font-size:0.95rem;
    border-radius:8px;
    border:1px solid #ccc;
    background:#fafafa;
    cursor:pointer;
    margin:4px;
  }

  input{padding:8px}
  .active{background:#111;color:#fff}

  #chosenExerciseDisplay,
  #timer,
  #thanks{
    font-size:18px;
    line-height:1.3;
    margin-left:0;
    margin-top:4px;
    margin-bottom:4px;
    min-height:20px;
  }

  #latestList{
    white-space:pre-line;
    font-size:18px;
    line-height:1.3;
  }
</style>
</head>
<body>

<div style="font-size:18px; margin-bottom:10px; line-height:1.3;">
  Hej <span id="welcomeName">ven</span> 👋
  <br><br>
</div>

<div class="section">
  <button class="exerciseBtn" data-ex="random">Start energipause</button>
</div>

<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>

<div id="thanks" style="display:none; margin-top:20px;"></div>

<details id="teamToggle" style="margin-top:30px; margin-bottom:20px;">
  <summary style="cursor:pointer; font-size:16px; font-weight:500;">
    Team statistik
  </summary>

  <div style="margin-top:12px;">
    <div id="statTotal" style="margin-bottom:8px; color:#444;"></div>
