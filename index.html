<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v150</title>

<style>
body{font-family:system-ui;padding:16px}
.hidden{display:none}
#img{max-width:200px;margin-top:10px}
#feed{margin-top:20px;font-size:.9rem;color:#444}
#nameModal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#0008;display:flex;align-items:center;justify-content:center;
}
#nameBox{
  background:white;padding:20px;border-radius:8px;max-width:300px;width:90%;
}
#adminPanel{
  margin-top:30px;
  padding:16px;
  border:1px solid #ccc;
  border-radius:8px;
}
#adminPanel table{
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}
#adminPanel th,#adminPanel td{
  border-bottom:1px solid #ddd;
  padding:6px;
  text-align:left;
}
#adminPanel button{
  padding:4px 8px;
  font-size:.8rem;
}
</style>
</head>

<body>

<div id="nameModal" class="hidden">
  <div id="nameBox">
    <h3>Hvad vil du kaldes?</h3>
    <input id="nameInput" style="width:100%;padding:8px;font-size:1rem">
    <button id="nameSave" style="margin-top:10px;width:100%">Gem</button>
  </div>
</div>

<h2 id="title"></h2>
<img id="img" class="hidden">
<button id="start">Start 2 min</button>
<div id="count" class="hidden">2:00</div>

<div id="energy" class="hidden">
  <p>Gav aktiviteten dig mere energi?</p>
  <button data-v="ja">Ja</button>
  <button data-v="nej">Nej</button>
  <button data-v="ved_ikke">Ved ikke</button>
</div>

<div id="micro" class="hidden"></div>

<h3>Team feed</h3>
<div id="feed">Indlæser…</div>

<div id="adminPanel" class="hidden">
  <h3>Team admin</h3>
  <table id="adminTable">
    <thead>
      <tr>
        <th>Navn</th>
        <th>Device</th>
        <th>Sidst aktiv</th>
        <th>Aktiv</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const p = new URLSearchParams(location.search);
if (p.get("team")) localStorage.setItem("team", p.get("team"));
const TEAM = localStorage.getItem("team") || "demo";

let DEVICE = localStorage.getItem("device_id");
if (!DEVICE) {
  DEVICE = "dev_" + crypto.randomUUID().slice(0,12);
  localStorage.setItem("device_id", DEVICE);
}

let NAME = localStorage.getItem("name");
const nameModal = document.getElementById("nameModal");
const nameInput = document.getElementById("nameInput");
const nameSave = document.getElementById("nameSave");

function ensureName(){
  if (!NAME) nameModal.classList.remove("hidden");
}

const BASE = "https://workerff092.jakobhelkjaer.workers.dev";
const api = (p, o={}) => fetch(BASE+p, { ...o, mode:"cors" }).then(r => r.json());

async function registerDevice(){
  if (!NAME) return;
  await api("/api/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      device_id: DEVICE,
      team_id: TEAM,
      display_name: NAME
    })
  });
}

nameSave.onclick = async () => {
  const v = nameInput.value.trim();
  if (!v) return;
  NAME = v;
  localStorage.setItem("name", NAME);
  nameModal.classList.add("hidden");
  await registerDevice();
  loadFeed();
};

const acts = [
  { t: "Lægløft", i: "images/laegloeft.png" },
  { t: "Squats", i: "images/squats.png" },
  { t: "Armcirkler", i: "images/armcirkel.png" }
];

function $(id){ return document.getElementById(id) }

const title = $("title");
const img = $("img");
const start = $("start");
const count = $("count");
const energy = $("energy");
const micro = $("micro");
const feed = $("feed");

let timer;

function showAct(){
  const a = acts[Math.random()*acts.length | 0];
  title.textContent = a.t;
  img.src = a.i;
  img.classList.remove("hidden");
  energy.classList.add("hidden");
  micro.classList.add("hidden");
  count.classList.add("hidden");
}

function startTimer(){
  let s = 120;
  count.classList.remove("hidden");
  const upd = () => count.textContent = `${(s/60|0)}:${String(s%60).padStart(2,"0")}`;
  upd();
  timer = setInterval(() => {
    s--;
    upd();
    if (s <= 0) {
      clearInterval(timer);
      energy.classList.remove("hidden");
    }
  }, 1000);
}

async function complete(v){
  const now = new Date().toISOString();
  await api("/api/event", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      team_id: TEAM,
      display_name: NAME,
      activity: title.textContent,
      energy: v,
      timestamp: now
    })
  });
  micro.classList.remove("hidden");
  micro.textContent = "Tak for pausen. Godt gået!";
  energy.classList.add("hidden");
  loadFeed();
}

async function loadFeed(){
  const rows = await api(`/api/team_feed?team_id=${TEAM}&limit=20`);
  feed.innerHTML = rows.map(r =>
    `${r.display_name}: ${r.activity} kl. ${
      new Date(r.timestamp).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})
    }`
  ).join("<br>");
}

const adminPanel = $("adminPanel");
const adminTable = $("adminTable").querySelector("tbody");

async function loadAdmin(){
  if (!p.get("admin")) return;
  adminPanel.classList.remove("hidden");
  const rows = await api(`/api/devices?team_id=${TEAM}`);
  adminTable.innerHTML = rows.map(r => `
    <tr>
      <td>${r.display_name}</td>
      <td>${r.device_id}</td>
      <td>${new Date(r.last_seen).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})}</td>
      <td>${r.active ? "Ja" : "Nej"}</td>
      <td><button data-del="${r.device_id}">Slet</button></td>
    </tr>
  `).join("");
}

adminTable.onclick = async e => {
  const btn = e.target.closest("button[data-del]");
  if (!btn) return;
  const id = btn.dataset.del;
  await api(`/api/device?device_id=${id}`, { method:"DELETE" });
  loadAdmin();
};

start.onclick = () => { clearInterval(timer); startTimer() };
energy.onclick = e => {
  const b = e.target.closest("button[data-v]");
  if (b) complete(b.dataset.v);
};

window.onload = () => {
  ensureName();
  if (NAME) registerDevice();
  showAct();
  loadFeed();
  loadAdmin();
};
</script>

</body>
</html>
