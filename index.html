<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v11</title>
<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  .section{margin:20px 0}
  button{padding:10px 16px;font-size:0.95rem;border-radius:8px;border:1px solid #ccc;background:#fafafa;cursor:pointer;margin:4px}
  .active{background:#111;color:#fff}
  #timer{font-size:40px;margin:20px 0;min-height:48px}
  input{padding:8px;font-size:0.95rem;border-radius:6px;border:1px solid #ccc;margin:4px 0}
  #chosenExerciseDisplay{font-size:18px;margin-top:10px;min-height:24px}
</style>
</head>
<body>

<div style="font-size:18px; margin-bottom:10px;">
  Hej <span id="welcomeName">ven</span> 👋
  <br><br>
  Få en energipause med et klik:
</div>

<div class="section">
  <button class="exerciseBtn" data-ex="Armstræk">💪 Armstræk</button>
  <button class="exerciseBtn" data-ex="Squats">🦵 Squats</button>
  <button class="exerciseBtn" data-ex="Stræk">🤸 Stræk</button>
  <button class="exerciseBtn" data-ex="random">🎲 Overrask mig!</button>
</div>

<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>
<button id="finishBtn" style="display:none; margin-top:10px;">Færdig nu</button>

<div id="thanks" style="display:none;margin-top:20px; white-space:pre-line;"></div>

<!-- ⭐ Indstillinger rykket 40px ned -->
<details style="margin-top:40px;">
  <summary>Indstillinger</summary>
  <div style="margin-top:12px">
    <div>Dit navn:</div>
    <input id="nameInput" type="text" placeholder="Skriv dit navn">
    <br><br>
    <div>Varighed (energipause):</div>
    <button class="timeBtn" data-time="30">30 sek</button>
    <button class="timeBtn" data-time="60">1 min</button>
    <button class="timeBtn" data-time="120">2 min</button>
  </div>
</details>

<script>
const WORKER_URL = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";
const api = (p) => WORKER_URL.replace(/\/+$/,"") + p;

// DOM
const nameInput = document.getElementById("nameInput");
const welcomeName = document.getElementById("welcomeName");
const exerciseBtns = document.querySelectorAll(".exerciseBtn");
const timeBtns = document.querySelectorAll(".timeBtn");
const timerEl = document.getElementById("timer");
const chosenExerciseDisplay = document.getElementById("chosenExerciseDisplay");
const finishBtn = document.getElementById("finishBtn");
const thanks = document.getElementById("thanks");

// STATE
let chosenExercise = "random";
let chosenTime = Number(localStorage.getItem("time") || 60);
let timerId = null;
let pauseStart = null;
let latestFeedCache = [];

// NAVN
nameInput.value = localStorage.getItem("name") || "";
welcomeName.textContent = nameInput.value || "ven";
nameInput.oninput = () => {
  localStorage.setItem("name", nameInput.value);
  welcomeName.textContent = nameInput.value || "ven";
};

// TID
timeBtns.forEach(btn => {
  if (Number(btn.dataset.time) === chosenTime) btn.classList.add("active");
  btn.onclick = () => {
    timeBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    chosenTime = Number(btn.dataset.time);
    localStorage.setItem("time", chosenTime);
  };
});

// ØVELSE
exerciseBtns.forEach(btn => {
  btn.onclick = () => {
    exerciseBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    if (btn.dataset.ex === "random") {
      const list = ["Armstræk","Squats","Stræk"];
      chosenExercise = list[Math.floor(Math.random()*list.length)];
    } else {
      chosenExercise = btn.dataset.ex;
    }

    chosenExerciseDisplay.textContent = "";
    startTimer();
  };
});

// TIMER
function startTimer() {
  thanks.style.display = "none";

  let s = chosenTime;
  pauseStart = Date.now();
  finishBtn.style.display = "inline-block";

  timerEl.textContent = format(s);

  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    timerEl.textContent = format(s);
    if (s-- <= 0) {
      finishPause();
    }
  }, 1000);
}

// ⭐ v11: LANGT FORMAT
function format(sec) {
  const m = sec / 60 | 0;
  const s = sec % 60;
  return `${m} min ${String(s).padStart(2,'0')} sek`;
}

// FÆRDIG-KNAP
finishBtn.onclick = finishPause;

async function finishPause() {
  clearInterval(timerId);
  timerId = null;
  finishBtn.style.display = "none";
  timerEl.textContent = "";

  const duration = Math.round((Date.now() - pauseStart) / 1000);

  const payload = {
    name: nameInput.value || "Ukendt",
    exercise: chosenExercise,
    duration
  };

  await fetch(api("/feed"), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload),
    cache:"no-store"
  });

  setTimeout(() => {
    showMicroFeedback();
  }, 300);
}

// EMOJI MAP
const emojiMap = {
  "Armstræk": "💪",
  "Squats": "🦵",
  "Stræk": "🤸"
};

// MICROFEEDBACK v11
function showMicroFeedback() {
  const items = latestFeedCache;
  const total = items.length;

  const latest = {};
  items.forEach(i => {
    if (!latest[i.name] || i.ts > latest[i.name].ts) latest[i.name] = i;
  });

  let lines = "Godt gået! 🙌\n\n";
  lines += `Dit team har nu ladt op med i alt ${total} energipauser.\n\n`;
  lines += "Dine team venners seneste energipauser er:\n";

  Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i => {
      const emoji = emojiMap[i.exercise] || "✨";
      lines += `${emoji} ${i.name}: ${i.exercise}\n`;
    });

  thanks.textContent = lines;
  thanks.style.display = "block";
}

// GET FEED
function loadFeed() {
  fetch(api("/feed"), { cache:"no-store" })
    .then(r => r.json())
    .then(items => {
      latestFeedCache = items;
    });
}

// AUTO-REFRESH
setInterval(loadFeed, 3000);

loadFeed();
</script>

</body>
</html>
