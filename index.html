<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v193 – Zen</title>

<style>
  body {
    font-family: system-ui;
    margin: 0;
    padding: 24px;
    background: #fff;
    color: #111;
  }

  /* Zen layout */
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    opacity: 0.7;
  }

  #settingsBtn, #feedBtn {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px;
  }

  #flow {
    text-align: center;
    margin-top: 40px;
  }

  button {
    padding: 12px 20px;
    font-size: 1.1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fafafa;
    cursor: pointer;
    margin: 6px 0;
  }

  button:active {
    background: #eee;
  }

  #activityImg {
    max-width: 180px;
    margin: 20px auto;
    display: block;
  }

  /* Modal (settings + feed) */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background: white;
    padding: 24px;
    border-radius: 12px;
    width: 90%;
    max-width: 360px;
  }

  .hidden { display: none; }
</style>
</head>

<body>

<!-- Topbar -->
<div id="topbar">
  <span id="username"></span>
  <div>
    <button id="feedBtn">☰</button>
    <button id="settingsBtn">⚙</button>
  </div>
</div>

<!-- Flow container -->
<div id="flow">

  <!-- Start -->
  <div id="step-start">
    <button id="startBtn">Start pause</button>
  </div>

  <!-- Aktivitet -->
  <div id="step-activity" class="hidden">
    <img id="activityImg" alt="">
    <p id="activityName"></p>
    <p id="timerText">2:00</p>
  </div>

  <!-- Energi -->
  <div id="step-energy" class="hidden">
    <p>Hvordan føles din energi?</p>
    <button data-v="større">Større</button>
    <button data-v="samme">Samme</button>
    <button data-v="mindre">Mindre</button>
    <button data-v="ved_ikke">Ved ikke</button>
  </div>

  <!-- Feedback -->
  <p id="feedback" class="hidden"></p>

</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3>Påmindelsesinterval</h3>
    <input id="intervalInput" type="number" min="0.1" step="0.1" value="25">
    <p id="intervalText"></p>
    <button id="closeSettings">Luk</button>
  </div>
</div>

<!-- Feed modal -->
<div id="feedModal" class="modal hidden">
  <div class="modal-content">
    <h3>Seneste pauser</h3>
    <div id="feed">Indlæser…</div>
    <button id="closeFeed">Luk</button>
  </div>
</div>

<script>
/* ---------- USER ---------- */
const NAME = localStorage.getItem("name") || "Bruger";
document.getElementById("username").textContent = NAME;

/* ---------- ELEMENTS ---------- */
const startBtn = document.getElementById("startBtn");
const stepStart = document.getElementById("step-start");
const stepActivity = document.getElementById("step-activity");
const stepEnergy = document.getElementById("step-energy");
const feedback = document.getElementById("feedback");
const timerText = document.getElementById("timerText");
const activityNameEl = document.getElementById("activityName");
const activityImg = document.getElementById("activityImg");

/* ---------- SETTINGS ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsModal = document.getElementById("settingsModal");
const closeSettings = document.getElementById("closeSettings");
const intervalInput = document.getElementById("intervalInput");
const intervalText = document.getElementById("intervalText");

let REMINDER_INTERVAL = (localStorage.getItem("reminderInterval") || 25) * 60000;
let reminderTimer = null;

intervalText.textContent = "Aktuelt: " + (REMINDER_INTERVAL/60000) + " min";

/* ---------- FEED ---------- */
const feedBtn = document.getElementById("feedBtn");
const feedModal = document.getElementById("feedModal");
const closeFeed = document.getElementById("closeFeed");
const feed = document.getElementById("feed");

/* ---------- ACTIVITIES ---------- */
const acts = [
  { t: "Lægløft", i: "images/laegloeft.png" },
  { t: "Squats", i: "images/squats.png" },
  { t: "Armcirkler", i: "images/armcirkel.png" }
];

/* ---------- REMINDER ---------- */
function showReminder() {
  stepStart.classList.remove("hidden");
  feedback.classList.add("hidden");
}

function scheduleReminder() {
  if (reminderTimer) clearTimeout(reminderTimer);
  reminderTimer = setTimeout(showReminder, REMINDER_INTERVAL);
}

/* ---------- FLOW ---------- */
startBtn.addEventListener("click", () => {
  const a = acts[Math.random()*acts.length | 0];
  activityNameEl.textContent = a.t;
  activityImg.src = a.i;

  stepStart.classList.add("hidden");
  stepActivity.classList.remove("hidden");

  let s = 120;
  const tick = () => {
    timerText.textContent = `${(s/60|0)}:${String(s%60).padStart(2,"0")}`;
    if (s-- <= 0) {
      stepActivity.classList.add("hidden");
      stepEnergy.classList.remove("hidden");
      clearInterval(t);
    }
  };
  tick();
  const t = setInterval(tick, 1000);
});

document.querySelectorAll("#step-energy button").forEach(btn => {
  btn.addEventListener("click", () => {
    stepEnergy.classList.add("hidden");
    feedback.textContent = "Tak! Næste pause planlagt.";
    feedback.classList.remove("hidden");
    scheduleReminder();
  });
});

/* ---------- SETTINGS ---------- */
settingsBtn.onclick = () => settingsModal.classList.remove("hidden");
closeSettings.onclick = () => settingsModal.classList.add("hidden");

intervalInput.oninput = () => {
  const m = Number(intervalInput.value);
  if (m > 0) {
    REMINDER_INTERVAL = m * 60000;
    localStorage.setItem("reminderInterval", m);
    intervalText.textContent = "Aktuelt: " + m + " min";
    scheduleReminder();
  }
};

/* ---------- FEED ---------- */
feedBtn.onclick = async () => {
  feedModal.classList.remove("hidden");
  feed.textContent = "Indlæser…";

  const r = await fetch("https://flowfocus-aa-2704.jakobhelkjaer.workers.dev/api/team_feed?team_id=demo&limit=20");
  const rows = await r.json();

  feed.innerHTML = rows.map(r => `${r.display_name}: ${r.activity}`).join("<br>");
};

closeFeed.onclick = () => feedModal.classList.add("hidden");

/* ---------- INIT ---------- */
scheduleReminder();
</script>

</body>
</html>
