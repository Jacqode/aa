<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v159</title>

<style>
body{font-family:system-ui;padding:16px;max-width:720px;margin:auto}
.hidden{display:none}
#img{max-width:200px;margin-top:10px;display:block}
#feed{margin-top:20px;font-size:.95rem;color:#444}
#micro{margin-top:12px;color:green}
#controls{margin-top:12px;display:flex;align-items:center;gap:12px}
button{cursor:pointer}
#meta{font-size:.85rem;color:#666;margin-top:8px}
</style>
</head>

<body>

<h2 id="title"></h2>
<img id="img" class="hidden" alt="">
<div id="controls">
  <button id="start">Start 2 min</button>
  <div id="count" class="hidden">2:00</div>
  <div id="meta" class="hidden"></div>
</div>

<div id="energy" class="hidden" aria-live="polite">
  <p><strong>Hvordan er din energi efter aktiviteten?</strong></p>
  <button data-v="ja">Ja</button>
  <button data-v="nej">Nej</button>
  <button data-v="ved_ikke">Ved ikke</button>
</div>

<div id="micro" class="hidden" role="status"></div>

<h3>Team feed</h3>
<div id="feed">Indlæser…</div>

<script>
/* ---------- AUTOJOIN (team + name + org fra URL) ---------- */
const p = new URLSearchParams(location.search);
if (p.get("team")) localStorage.setItem("team", p.get("team"));
if (p.get("name")) localStorage.setItem("name", p.get("name"));
if (p.get("org"))  localStorage.setItem("org",  p.get("org"));

const TEAM = (localStorage.getItem("team") || "demo").trim();
const NAME = (localStorage.getItem("name") || "Ukendt").trim();
const ORG  = (localStorage.getItem("org")  || "default_org").trim();

/* ---------- DEVICE-ID ---------- */
let DEVICE = localStorage.getItem("device_id");
if (!DEVICE) {
  DEVICE = "dev_" + (crypto.randomUUID ? crypto.randomUUID().slice(0,12) : Math.random().toString(36).slice(2,14));
  localStorage.setItem("device_id", DEVICE);
}

/* ---------- API WRAPPER ---------- */
const BASE = "https://workerff092.jakobhelkjaer.workers.dev";
async function api(path, opts = {}) {
  try {
    const res = await fetch(BASE + path, { ...opts, mode: "cors" });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch(e) { json = text; }
    if (!res.ok) return { ok:false, status:res.status, body:json };
    return { ok:true, status:res.status, body:json };
  } catch (err) {
    return { ok:false, status:0, body:null, error:err };
  }
}

/* ---------- REGISTER DEVICE ---------- */
async function registerDevice(){
  const payload = {
    device_id: DEVICE,
    display_name: NAME,
    team_id: TEAM,
    org_id: ORG,
    last_seen: new Date().toISOString()
  };
  await api("/api/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
}

/* ---------- UI HELPERS ---------- */
function $(id){ return document.getElementById(id) }
function escapeHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

/* ---------- ELEMENTS ---------- */
const titleEl = document.getElementById("title");   // FIXED
const img = $("img");
const start = $("start");
const count = $("count");
const meta = $("meta");
const energy = $("energy");
const micro = $("micro");
const feed = $("feed");

let timer;

/* ---------- ACTIVITIES ---------- */
const acts = [
  { t: "Lægløft", i: "images/laegloeft.png" },
  { t: "Squats", i: "images/squats.png" },
  { t: "Armcirkler", i: "images/armcirkel.png" }
];

function showAct(){
  const a = acts[Math.random()*acts.length | 0];
  titleEl.textContent = a.t;
  img.src = a.i;
  img.alt = a.t;
  img.classList.remove("hidden");

  count.classList.add("hidden");
  micro.classList.add("hidden");

  meta.textContent = `Team: ${TEAM} · Navn: ${NAME}`;
  meta.classList.remove("hidden");

  energy.classList.remove("hidden");
}

/* ---------- TIMER ---------- */
function startTimer(){
  start.disabled = true;
  let s = 120;
  count.classList.remove("hidden");
  const upd = () => count.textContent = `${(s/60|0)}:${String(s%60).padStart(2,"0")}`;
  upd();
  timer = setInterval(() => {
    s--;
    upd();
    if (s <= 0) {
      clearInterval(timer);
      start.disabled = false;
    }
  }, 1000);
}

/* ---------- SEND EVENT ---------- */
async function complete(v){
  const now = new Date().toISOString();
  const payload = {
    id: crypto.randomUUID(),
    device_id: DEVICE,
    display_name: NAME,
    team_id: TEAM,
    org_id: ORG,
    activity: titleEl.textContent || "Ukendt",
    energy: v,
    timestamp: now
  };

  const r = await api("/api/event", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  if (!r.ok) {
    micro.classList.remove("hidden");
    micro.textContent = "Kunne ikke sende. Prøv igen.";
    return;
  }

  micro.classList.remove("hidden");
  micro.textContent = "Tak for pausen!";
  await loadFeed();
}

/* ---------- TEAM FEED ---------- */
async function loadFeed(){
  feed.textContent = "Indlæser…";
  const r = await api(`/api/team_feed?team_id=${encodeURIComponent(TEAM)}&limit=20`);
  if (!r.ok) {
    feed.textContent = "Kunne ikke hente feed.";
    return;
  }

  const rows = r.body;
  if (!Array.isArray(rows) || rows.length === 0) {
    feed.textContent = "Ingen aktiviteter endnu.";
    return;
  }

  rows.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  feed.innerHTML = rows.map(rw => {
    const name = escapeHtml(rw.display_name || "Ukendt");
    const act = escapeHtml(rw.activity || "Aktivitet");
    const ts = rw.timestamp ? new Date(rw.timestamp) : null;
    const time = ts ? ts.toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"}) : "–";
    return `${name}: ${act} kl. ${time}`;
  }).join("<br>");
}

/* ---------- INIT ---------- */
window.addEventListener("load", async () => {
  showAct();
  await registerDevice();
  await loadFeed();
  setInterval(loadFeed, 15000);
});
</script>

</body>
</html>
