<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus – Reminder Only</title>

<style>
  body{font-family:system-ui;margin:0;padding:40px;text-align:center;background:#fff;color:#111}
  button{padding:14px 24px;font-size:1.1rem;border-radius:8px;border:1px solid #ccc;background:#fafafa;cursor:pointer}
  #timer{font-size:48px;margin:40px 0;font-weight:600}
</style>
</head>

<body>

<h2>Flow Focus – Reminder</h2>

<div id="timer">2:00</div>

<button id="startBtn">Start 2‑minutters pause</button>

<script>
// --- Registrer service worker ---
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

// --- Bed om notifikationstilladelse ved brugerklik ---
const ensurePermission = async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch(e){}
  }
};

// --- Elements ---
const timerEl = document.getElementById("timer");
const startBtn = document.getElementById("startBtn");

let timerId = null;

// --- Start 2-minutters timer ---
const startTimer = () => {
  if (timerId) clearInterval(timerId);

  let s = 120;
  timerEl.textContent = "2:00";

  timerId = setInterval(() => {
    timerEl.textContent = `${s/60|0}:${String(s%60).padStart(2,'0')}`;

    if (s-- <= 0) {
      clearInterval(timerId);
      timerId = null;

      // OS-notifikation direkte via SW
      navigator.serviceWorker.ready.then(reg => {
        if (Notification.permission === "granted") {
          reg.showNotification("Tid til en pause", {
            body: "",
            icon: "icon-192.png",
            badge: "icon-192.png",
            data: { url: location.href }
          });
        }
      });
    }
  }, 1000);
};

// --- Klik på start ---
startBtn.onclick = async () => {
  await ensurePermission();
  startTimer();
};
</script>

</body>
</html>
