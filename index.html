<!-- Flow Focus — FRONTEND v19 -->

<!-- ------------------------------------------------------
     Version: v19
     UI: v17-stil (simpelt, hurtigt, intuitivt)
     Backend: Worker v19 (D1 + teams)
     Funktioner:
     - Start/stop timer
     - Notifikationer
     - Reminders
     - Statistik (v17-style)
     - Team via ?team=psy
     ------------------------------------------------------ -->

<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow Focus v19</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      padding-bottom: 80px;
    }
    h1 { margin-bottom: 5px; }
    .small { color: #777; font-size: 13px; margin-bottom: 20px; }
    button {
      padding: 12px 18px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
      width: 100%;
    }
    #status { margin-top: 20px; font-size: 14px; color: #444; }
    #statsBox { margin-top: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; }
    #statsBox h3 { margin-top: 0; }
  </style>
</head>

<body>

  <h1>Flow Focus</h1>
  <div class="small">Version <strong>v19</strong> — D1 backend</div>

  <label>Dit navn:</label><br>
  <input id="name" placeholder="Skriv dit navn" style="width:100%;padding:10px;margin-bottom:15px">

  <label>Vælg øvelse:</label><br>
  <select id="exercise" style="width:100%;padding:10px;margin-bottom:15px">
    <option value="Stræk">Stræk</option>
    <option value="Vejrtrækning">Vejrtrækning</option>
    <option value="Pause">Pause</option>
    <option value="Gåtur">Gåtur</option>
  </select>

  <button id="startBtn">Start</button>
  <button id="stopBtn" disabled>Færdig nu</button>

  <div id="status"></div>

  <div id="statsBox">
    <h3>Statistik</h3>
    <div id="statsContent">Indlæser…</div>
  </div>

<script>
  // ------------------------------------------------------
  // Konfiguration
  // ------------------------------------------------------
  const workerBase = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";
  const urlParams = new URLSearchParams(window.location.search);
  const team = urlParams.get("team") || "default";

  let startTime = null;

  // ------------------------------------------------------
  // Notifikationstilladelse
  // ------------------------------------------------------
  if (Notification && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function notify(msg) {
    if (Notification.permission === "granted") {
      new Notification(msg);
    }
  }

  // ------------------------------------------------------
  // Start pause
  // ------------------------------------------------------
  document.getElementById("startBtn").onclick = () => {
    startTime = Date.now();
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("status").innerText = "I gang…";

    notify("Din pause er startet");
  };

  // ------------------------------------------------------
  // Stop pause → send event til worker
  // ------------------------------------------------------
  document.getElementById("stopBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const exercise = document.getElementById("exercise").value;

    if (!name) {
      alert("Skriv dit navn først");
      return;
    }

    const duration = Math.round((Date.now() - startTime) / 1000);

    document.getElementById("status").innerText = "Sender…";

    await fetch(workerBase + "/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        team_id: team,
        name,
        exercise,
        duration
      })
    });

    document.getElementById("status").innerText = "Gemt ✔";
    notify("Din pause er gemt");

    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;

    loadStats();
  };

  // ------------------------------------------------------
  // Hent statistik (v17-style)
  // ------------------------------------------------------
  async function loadStats() {
    const res = await fetch(workerBase + "/feed?team=" + team);
    const data = await res.json();

    let html = `
      <div><strong>Total:</strong> ${data.feed.length}</div>
      <br>
      <strong>Seneste:</strong><br>
    `;

    data.feed.forEach(ev => {
      const d = new Date(ev.ts * 1000).toLocaleTimeString("da-DK");
      html += `${d} — ${ev.name} (${ev.exercise}, ${ev.duration}s)<br>`;
    });

    document.getElementById("statsContent").innerHTML = html;
  }

  loadStats();

  // ------------------------------------------------------
  // Reminders (v17-style)
  // ------------------------------------------------------
  setInterval(() => {
    notify("Tid til en lille pause?");
  }, 1000 * 60 * 45); // hver 45. minut
</script>

</body>
</html>
