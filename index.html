<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>OS Notification Test</title>
</head>
<body>

<script>
/* ===== SIMPLE OS NOTIFICATION TEST ===== */

// Ask permission once
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}

// Simple reminder function
function showOSReminder() {
  if (!("Notification" in window)) return;
  if (Notification.permission !== "granted") return;

  const n = new Notification("Flow Focus", {
    body: "Stræk skuldrene i 20 sek.",
    requireInteraction: true
  });

// Fire after 10 seconds (for testing)
setTimeout(showOSReminder, 10000);
</script>

</body>
</html>
