<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Flow Focus v092</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #ff-activity-title { font-weight:600; font-size:1.2rem; }
    #ff-activity-image { max-width:200px; margin-top:10px; }
    #ff-activity-description { margin-top:10px; }
    #ff-start-activity, #ff-done-btn { margin-top:12px; }
    #ff-activity-countdown { font-size:1.4rem; margin-top:6px; }
    #ff-microfeedback { margin-top:10px; font-weight:500; white-space:pre-line; }
    #ff-settings { margin-top:10px; }
  </style>
</head>
<body>

<div id="ff-box" hidden>
  <div id="ff-step-activity" hidden>

    <p id="ff-activity-title"></p>
    <img id="ff-activity-image" alt="Øvelse" hidden>
    <p id="ff-activity-description"></p>

    <button id="ff-start-activity">Start 2-minutters timer</button>
    <div id="ff-activity-countdown" hidden>2:00</div>

    <button id="ff-done-btn">Jeg har gjort det</button>

    <p id="ff-microfeedback" hidden></p>

    <p><a href="#" id="ff-settings-toggle">⚙️ Indstillinger</a></p>

    <div id="ff-settings" hidden>
      <h4>Påmindelser</h4>
      <input id="ff-reminder-input" type="number" min="1" style="width:60px;"> minutter
      <br><br>
      <button id="ff-reminder-save">Gem</button>
      <button id="ff-reminder-disable">Slå fra</button>
      <p id="ff-reminder-feedback"></p>
    </div>

  </div>
</div>

<script>
let countdownInterval = null;
let activityInterval = null;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

async function requestNotificationPermission() {
  return (await Notification.requestPermission()) === "granted";
}

function sendReminderNotification() {
  if (Notification.permission !== "granted") return;
  navigator.serviceWorker.getRegistration().then(reg => {
    reg?.showNotification("Flow Focus", {
      body: "Tid til en aktiv mikropause – tryk for at åbne Flow Focus",
      icon: "icon-192.png",
      badge: "icon-192.png",
      data: { url: "https://jacqode.github.io/aa" }
    });
  });
}

const ffActivities = [
  { title: "Gang på stedet i 2 min", text: "Gå roligt på stedet med lette skridt.", duration: 2, image: "images/gang.png" },
  { title: "Lægløft i 2 min", text: "Løft og sænk hælene roligt for at aktivere lægmusklerne.", duration: 2, image: "images/laegloeft.png" },
  { title: "Rejs og sæt dig i 2 min", text: "Rejs dig roligt og sæt dig igen.", duration: 2, image: "images/rejs.png" },
  { title: "Armcirkler i 2 min", text: "Stræk armene ud til siderne og lav store cirkler fremad og baglæns.", duration: 2, image: "images/armcirkel.png" },
  { title: "Benstræk i 2 min", text: "Stræk ét ben ad gangen og hold kort, før du skifter.", duration: 2, image: "images/benstraek.png" }
];

const el = id => document.getElementById(id);

function getRandomActivity() {
  return ffActivities[Math.floor(Math.random() * ffActivities.length)];
}

function formatMicrofeedback(today, total, startDate, nextTime) {
  const next = new Date(Number(nextTime));
  const nextClock = next.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });

  return (
    "Mikropauser\n" +
    `- i dag: ${today}\n` +
    `- i alt: ${total}\n` +
    "\n" +
    `Næste mikropause er kl. ${nextClock}.\n` +
    "\n" +
    "God arbejdslyst indtil da!"
  );
}

function showActivity() {
  const a = getRandomActivity();
  el("ff-activity-title").textContent = a.title;
  el("ff-activity-description").textContent = a.text;

  if (a.image) {
    el("ff-activity-image").src = a.image;
    el("ff-activity-image").hidden = false;
  } else {
    el("ff-activity-image").hidden = true;
  }

  el("ff-activity-countdown").hidden = true;
  el("ff-step-activity").hidden = false;

  el("ff-start-activity").onclick = () => {
    clearInterval(activityInterval);
    startActivityTimer(a.duration);
  };
}

function startActivityTimer(minutes) {
  let seconds = minutes * 60;
  const display = el("ff-activity-countdown");
  display.hidden = false;

  const update = () => {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    display.textContent = `${m}:${s.toString().padStart(2, "0")}`;
  };

  update();
  activityInterval = setInterval(() => {
    seconds--;
    update();
    if (seconds <= 0) {
      clearInterval(activityInterval);
      new Audio("done.mp3").play();
    }
  }, 1000);
}

function resetUI() {
  el("ff-microfeedback").hidden = true;
  el("ff-activity-title").hidden = false;
  el("ff-activity-description").hidden = false;
  el("ff-done-btn").hidden = false;
  localStorage.removeItem("ff-next-pause-time");
  showActivity();
}

function startReminderTimer() {
  const interval = Number(localStorage.getItem("ff-reminder-interval")) || 30;
  localStorage.setItem("ff-reminder-interval", interval);

  const nextTime = Date.now() + interval * 60000;
  localStorage.setItem("ff-next-pause-time", nextTime);

  startCountdown();
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const nextTime = Number(localStorage.getItem("ff-next-pause-time"));
    const diff = nextTime - Date.now();

    if (diff <= 0) {
      clearInterval(countdownInterval);
      sendReminderNotification();
      resetUI();
    }
  }, 1000);
}

el("ff-done-btn").onclick = () => {
  const total = (Number(localStorage.getItem("ff-total-count")) || 0) + 1;
  localStorage.setItem("ff-total-count", total);

  const today = new Date().toISOString().slice(0, 10);
  const lastDay = localStorage.getItem("ff-last-day");
  const todayCount = today === lastDay
    ? (Number(localStorage.getItem("ff-today-count")) || 0) + 1
    : 1;

  localStorage.setItem("ff-last-day", today);
  localStorage.setItem("ff-today-count", todayCount);

  if (!localStorage.getItem("ff-start-date")) {
    const d = new Date();
    localStorage.setItem("ff-start-date",
      d.toLocaleDateString("da-DK", { day:"numeric", month:"long", year:"numeric" })
    );
  }

  const startDate = localStorage.getItem("ff-start-date");
  startReminderTimer();
  const nextTime = localStorage.getItem("ff-next-pause-time");

  ["ff-activity-title","ff-activity-description","ff-done-btn",
   "ff-start-activity","ff-activity-countdown","ff-activity-image"]
   .forEach(id => el(id).hidden = true);

  el("ff-microfeedback").textContent =
    formatMicrofeedback(todayCount, total, startDate, nextTime);
  el("ff-microfeedback").hidden = false;

  // ⭐ ENERGIKNAPPER (indsat her)
  const energyDiv = document.createElement("div");
  energyDiv.innerHTML = `
    <p>Hvordan føles energien nu?</p>
    <button onclick="sendEnergyDelta('mindre')">Mindre</button>
    <button onclick="sendEnergyDelta('samme')">Samme</button>
    <button onclick="sendEnergyDelta('mere')">Mere</button>
    <button onclick="sendEnergyDelta('ved_ikke')">Ved ikke</button>
  `;
  el("ff-microfeedback").insertAdjacentElement("afterend", energyDiv);
};

el("ff-settings-toggle").onclick = e => {
  e.preventDefault();
  el("ff-settings").hidden = !el("ff-settings").hidden;
};

el("ff-reminder-save").onclick = async () => {
  const m = Number(el("ff-reminder-input").value);
  if (m > 0) localStorage.setItem("ff-reminder-interval", m);

  const ok = await requestNotificationPermission();
  el("ff-reminder-feedback").textContent =
    ok ? "Påmindelser aktiveret." : "Tillad notifikationer for at få påmindelser.";
};

el("ff-reminder-disable").onclick = () => {
  localStorage.removeItem("ff-reminder-interval");
  localStorage.removeItem("ff-next-pause-time");
  el("ff-reminder-feedback").textContent = "Slået fra.";
  clearInterval(countdownInterval);
};

window.onload = () => {
  el("ff-box").hidden = false;
  el("ff-reminder-input").value =
    localStorage.getItem("ff-reminder-interval") || 30;

  showActivity();

  if (localStorage.getItem("ff-next-pause-time")) {
    startCountdown();
  }
};

/* ⭐ ENERGIDATA → WORKER */
function sendEnergyDelta(value) {
  fetch("https://workerff092.jakobhelkjaer.workers.dev/api/event", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: "demo-user-1",
      type: "energy_delta",
      value: value,
      timestamp: Date.now()
    })
  });
}
</script>

</body>
</html>
