<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus – v219</title>
<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  h2{margin-bottom:10px}
  .section{margin:20px 0}
  button{padding:10px 16px;font-size:0.95rem;border-radius:8px;border:1px solid #ccc;background:#fafafa;cursor:pointer;margin:4px}
  .active{background:#111;color:#fff}
  #timer{font-size:40px;margin:20px 0;font-weight:600}
  #feed div{padding:6px 0;border-bottom:1px solid #eee}
  input,select{padding:8px;font-size:0.95rem;border-radius:6px;border:1px solid #ccc;margin:4px 0}
</style>
</head>
<body>

<h2>Flow Focus – v219</h2>

<div class="section">
  <strong>Dit navn:</strong><br>
  <input id="nameInput" type="text" placeholder="Skriv dit navn">
</div>

<div class="section">
  <strong>Øvelse:</strong><br>
  <button class="exerciseBtn" data-ex="random">Tilfældig</button>
  <button class="exerciseBtn" data-ex="Armstræk">Armstræk</button>
  <button class="exerciseBtn" data-ex="Squats">Squats</button>
  <button class="exerciseBtn" data-ex="Stræk">Stræk</button>
</div>

<div class="section">
  <strong>Varighed (øvelse):</strong><br>
  <button class="timeBtn" data-time="30">30 sek</button>
  <button class="timeBtn" data-time="60">1 min</button>
  <button class="timeBtn" data-time="120">2 min</button>
</div>

<div class="section">
  <strong>Sammen med:</strong><br>
  <select id="withSelect">
    <option value="">Alene</option>
  </select>
</div>

<div class="section">
  <strong>Næste pause om:</strong><br>
  <button class="reminderBtn" data-min="0.5">30 sek (test)</button>
  <button class="reminderBtn" data-min="15">15 min</button>
  <button class="reminderBtn" data-min="25">25 min</button>
  <button class="reminderBtn" data-min="40">40 min</button>
</div>

<div class="section">
  <button id="startBtn">Start øvelse</button>
</div>

<div id="timer">–</div>

<div id="energySection" style="display:none">
  <strong>Hvordan er din energi nu?</strong><br><br>
  <button class="energyBtn" data-energy="mindre">Mindre</button>
  <button class="energyBtn" data-energy="samme">Samme</button>
  <button class="energyBtn" data-energy="større">Større</button>
  <button class="energyBtn" data-energy="ved ikke">Ved ikke</button>
</div>

<div id="thanks" style="display:none;margin-top:20px;font-weight:600"></div>

<div class="section">
  <h3>Team feed</h3>
  <div id="feed"></div>
</div>

<script>
// Sæt denne til din faktiske Worker public URL (uden trailing slash)
const WORKER_URL = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";

// Helper: fjern trailing slash og join paths korrekt
const api = (path) => {
  const base = WORKER_URL.replace(/\/+$/, '');
  return path.startsWith('/') ? base + path : base + '/' + path;
};

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(()=>{});
}

const nameInput = document.getElementById("nameInput");
const exerciseBtns = document.querySelectorAll(".exerciseBtn");
const timeBtns = document.querySelectorAll(".timeBtn");
const reminderBtns = document.querySelectorAll(".reminderBtn");
const withSelect = document.getElementById("withSelect");
const startBtn = document.getElementById("startBtn");
const timerEl = document.getElementById("timer");
const energySection = document.getElementById("energySection");
const thanks = document.getElementById("thanks");
const feedEl = document.getElementById("feed");

let chosenExercise = localStorage.getItem("exercise") || "random";
let chosenTime = Number(localStorage.getItem("time") || 60);
let reminderMinutes = Number(localStorage.getItem("reminder") || 25);
let timerId = null;

nameInput.value = localStorage.getItem("name") || "";
nameInput.oninput = () => localStorage.setItem("name", nameInput.value);

exerciseBtns.forEach(btn => {
  if (btn.dataset.ex === chosenExercise) btn.classList.add("active");
  btn.onclick = () => {
    exerciseBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    chosenExercise = btn.dataset.ex;
    localStorage.setItem("exercise", chosenExercise);
  };
});

timeBtns.forEach(btn => {
  if (Number(btn.dataset.time) === chosenTime) btn.classList.add("active");
  btn.onclick = () => {
    timeBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    chosenTime = Number(btn.dataset.time);
    localStorage.setItem("time", chosenTime);
  };
});

reminderBtns.forEach(btn => {
  if (Number(btn.dataset.min) === reminderMinutes) btn.classList.add("active");
  btn.onclick = () => {
    reminderBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    reminderMinutes = Number(btn.dataset.min);
    localStorage.setItem("reminder", reminderMinutes);
  };
});

// Load team list
fetch(api('/team'))
  .then(r => r.ok ? r.json() : [])
  .then(list => {
    list.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      withSelect.appendChild(opt);
    });
  })
  .catch(()=>{});

// Notification permission
const ensurePermission = async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch(e){}
  }
};

startBtn.onclick = async () => {
  await ensurePermission();
  startExerciseTimer();
};

function startExerciseTimer() {
  energySection.style.display = "none";
  thanks.style.display = "none";
  let s = chosenTime;
  timerEl.textContent = formatTime(s);
  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    timerEl.textContent = formatTime(s);
    if (s-- <= 0) {
      clearInterval(timerId);
      timerId = null;
      timerEl.textContent = "Færdig";
      showEnergyQuestion();
    }
  }, 1000);
}

function formatTime(sec) {
  return `${sec/60|0}:${String(sec%60).padStart(2,'0')}`;
}

function showEnergyQuestion() {
  energySection.style.display = "block";
}

document.querySelectorAll(".energyBtn").forEach(btn => {
  btn.onclick = () => {
    const energy = btn.dataset.energy;
    const exercise = chosenExercise === "random" ? randomExercise() : chosenExercise;
    const partner = withSelect.value || null;
    const name = nameInput.value || "Ukendt";

    postToFeed(name, exercise, energy, partner);

    const next = nextPauseTime();
    thanks.textContent = `Tak for dit svar. Næste pause er kl. ${next}`;
    thanks.style.display = "block";
    energySection.style.display = "none";

    scheduleNextNotification();
  };
});

function randomExercise() {
  const list = ["Armstræk","Squats","Stræk"];
  return list[Math.floor(Math.random()*list.length)];
}

function nextPauseTime() {
  const now = new Date();
  now.setSeconds(now.getSeconds() + Math.round(reminderMinutes * 60));
  return now.toTimeString().slice(0,5);
}

function scheduleNextNotification() {
  const ms = Math.round(reminderMinutes * 60 * 1000);
  setTimeout(() => {
    navigator.serviceWorker.ready.then(reg => {
      if (Notification.permission === "granted") {
        reg.showNotification("Tid til en pause", {
          body: "",
          icon: "icon-192.png",
          badge: "icon-192.png",
          data: { url: location.href }
        });
      }
    });
  }, ms);
}

function postToFeed(name, exercise, energy, partner) {
  fetch(api('/feed'), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name, exercise, energy, with: partner })
  }).then(() => setTimeout(loadFeed, 300)).catch(()=>{});
}

function loadFeed() {
  fetch(api('/feed'))
    .then(r => r.ok ? r.json() : [])
    .then(items => {
      feedEl.innerHTML = "";
      items.forEach(i => {
        const div = document.createElement("div");
        const txt = i.with
          ? `${i.name} og ${i.with} lavede ${i.exercise} – energi: ${i.energy}`
          : `${i.name} lavede ${i.exercise} – energi: ${i.energy}`;
        div.textContent = txt;
        feedEl.appendChild(div);
      });
    })
    .catch(()=>{});
}

loadFeed();
</script>

</body>
</html>
