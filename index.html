<!DOCTYPE html>
<html lang="da">
<head>
  <!-- 
  Flow Focus – Version 0.5
  - Evidensbaserede aktive mikropauser
  - Random aktivitet pr. pause
  - Påmindelser flyttet til Indstillinger (lavere friktion)
  -->
  <meta charset="UTF-8">
  <title>Flow Focus</title>
</head>
<body>

<h1>Hej 👋</h1>

<div id="ff-box" hidden>

  <!-- STEP 1 -->
  <div id="ff-step-energy-before" hidden>
    <h4>Hvordan er din energi lige nu?</h4>
    <p>Klik et sted på linjen</p>
    <div id="ff-vas-before" style="width:100%; height:40px; cursor:pointer;"></div>
  </div>

  <!-- STEP 2 -->
  <div id="ff-step-activity" hidden>
    <p id="ff-activity-text"></p>
    <button id="ff-done-btn">Jeg har gjort det</button>

    <p style="margin-top:12px;">
      <a href="#" id="ff-settings-toggle">⚙️ Indstillinger</a>
    </p>

    <!-- SETTINGS (tidl. Step 5) -->
    <div id="ff-settings" hidden>
      <h4>Påmindelser</h4>
      <input id="ff-reminder-input" type="number" min="1" style="width:60px;"> minutter
      <br><br>
      <button id="ff-reminder-save">Gem</button>
      <button id="ff-reminder-disable">Slå fra</button>
      <p id="ff-reminder-feedback"></p>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="ff-step-energy-after" hidden>
    <h4>Hvordan er din energi nu?</h4>
    <p>Klik et sted på linjen</p>
    <div id="ff-vas-after" style="width:100%; height:40px; cursor:pointer;"></div>
  </div>

</div>

<!-- STEP 4 -->
<div id="ff-graph-section" hidden>
  <canvas id="ff-graph" width="600" height="320"></canvas>
</div>

<script>
const FULL_FLOW = false;

// --- ACTIVITIES (evidence-based, light intensity) ---
const ffActivities = [
  {
    title: "Gang på stedet",
    text: "Gå roligt på stedet med lette skridt. Løft fødderne lidt fra gulvet og bevæg armene naturligt."
  },
  {
    title: "Stå på tæer",
    text: "Stå oprejst og løft langsomt hælene fra gulvet, så du står på tæer. Sænk roligt ned igen."
  },
  {
    title: "Rejs og sæt dig fra stol",
    text: "Rejs dig roligt fra stolen og sæt dig langsomt ned igen. Brug stolen som støtte."
  }
];

function getRandomActivity() {
  return ffActivities[Math.floor(Math.random() * ffActivities.length)];
}

// --- VAS ---
function createVASLine(id, cb) {
  const el = document.getElementById(id);
  el.onclick = e => {
    const v = Math.round((e.offsetX / el.offsetWidth) * 100);
    cb(v);
  };
}

// --- FLOW ---
window.onload = () => {
  document.getElementById("ff-box").hidden = false;

  const saved = localStorage.getItem("ff-reminder-interval") || 25;
  document.getElementById("ff-reminder-input").value = saved;

  if (FULL_FLOW) {
    document.getElementById("ff-step-energy-before").hidden = false;
  } else {
    showActivity();
  }
};

function showActivity() {
  const a = getRandomActivity();
  document.getElementById("ff-activity-text").textContent =
    "Aktivitet: " + a.title + " – " + a.text;
  document.getElementById("ff-step-activity").hidden = false;
}

createVASLine("ff-vas-before", v => {
  document.getElementById("ff-step-energy-before").hidden = true;
  showActivity();
});

document.getElementById("ff-done-btn").onclick = () => {
  document.getElementById("ff-step-activity").hidden = true;

  if (FULL_FLOW) {
    document.getElementById("ff-step-energy-after").hidden = false;
  }
};

createVASLine("ff-vas-after", v => {
  document.getElementById("ff-graph-section").hidden = false;
});

// --- SETTINGS TOGGLE ---
document.getElementById("ff-settings-toggle").onclick = e => {
  e.preventDefault();
  const s = document.getElementById("ff-settings");
  s.hidden = !s.hidden;
};

// --- REMINDER ---
document.getElementById("ff-reminder-save").onclick = () => {
  const m = Number(document.getElementById("ff-reminder-input").value);
  localStorage.setItem("ff-reminder-interval", m);
  document.getElementById("ff-reminder-feedback").textContent = "Gemt.";
};

document.getElementById("ff-reminder-disable").onclick = () => {
  localStorage.removeItem("ff-reminder-interval");
  document.getElementById("ff-reminder-feedback").textContent = "Slået fra.";
};
</script>

</body>
</html>
