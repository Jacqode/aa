<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v198 – Zen</title>

<style>
  body {
    font-family: system-ui;
    margin: 0;
    padding: 24px;
    background: #fff;
    color: #111;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    opacity: 0.7;
  }

  #settingsBtn, #feedBtn {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px;
  }

  #flow {
    text-align: center;
    margin-top: 40px;
  }

  button {
    padding: 12px 20px;
    font-size: 1.1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fafafa;
    cursor: pointer;
    margin: 6px 0;
  }

  button:active {
    background: #eee;
  }

  #activityImg {
    max-width: 180px;
    margin: 20px auto;
    display: block;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background: white;
    padding: 24px;
    border-radius: 12px;
    width: 90%;
    max-width: 360px;
  }

  .hidden { display: none; }

  /* Ændr-link */
  #changeInterval {
    font-size: 0.85rem;
    color: #777;
    cursor: pointer;
    margin-left: 6px;
  }

  #inlineInterval {
    margin-top: 14px;
  }

  #inlineInterval label {
    display: block;
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 6px;
  }

  #inlineInterval input {
    width: 80px;
    padding: 6px;
    font-size: 1rem;
  }

  /* Subtle feedback */
  #feedback {
    margin-top: 12px;
    color: #333;
    opacity: 0.95;
  }
</style>
</head>

<body>

<!-- Topbar -->
<div id="topbar">
  <span id="username"></span>
  <div>
    <button id="feedBtn">☰</button>
    <button id="settingsBtn">⚙</button>
  </div>
</div>

<!-- Flow container -->
<div id="flow">

  <!-- Start -->
  <div id="step-start">
    <button id="startBtn">Start pause</button>
  </div>

  <!-- Aktivitet -->
  <div id="step-activity" class="hidden">
    <img id="activityImg" alt="">
    <p id="activityName"></p>
    <p id="timerText">2:00</p>
  </div>

  <!-- Energi -->
  <div id="step-energy" class="hidden">
    <p>Hvordan føles din energi?</p>

    <button data-v="mindre">Mindre</button>
    <button data-v="samme">Samme</button>
    <button data-v="større">Større</button>
    <button data-v="ved_ikke">Ved ikke</button>
  </div>

  <!-- Feedback -->
  <p id="feedback" class="hidden"></p>

  <!-- Næste pause + Ændr -->
  <p id="nextPause" class="hidden">
    Næste pause kl. <span id="nextTime"></span>
    <span id="changeInterval">Ændr</span>
  </p>

  <!-- Inline interval editor -->
  <div id="inlineInterval" class="hidden" aria-hidden="true">
    <label for="inlineInput">Minutter mellem pauser:</label>
    <input id="inlineInput" type="number" min="1" step="1" inputmode="numeric" pattern="[0-9]*" />
  </div>

</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal hidden" aria-hidden="true">
  <div class="modal-content">
    <h3>Indstillinger</h3>

    <label>Navn:</label>
    <input id="nameInput" type="text" value="">
    <br><br>

    <button id="closeSettings">Luk</button>
  </div>
</div>

<!-- Feed modal -->
<div id="feedModal" class="modal hidden" aria-hidden="true">
  <div class="modal-content">
    <h3>Seneste pauser</h3>
    <div id="feed">Indlæser…</div>
    <button id="closeFeed">Luk</button>
  </div>
</div>

<script>
/* ---------- USER ---------- */
const NAME = localStorage.getItem("name") || "Bruger";
document.getElementById("username").textContent = NAME;
document.getElementById("nameInput").value = NAME;

/* ---------- ELEMENTS ---------- */
const startBtn = document.getElementById("startBtn");
const stepStart = document.getElementById("step-start");
const stepActivity = document.getElementById("step-activity");
const stepEnergy = document.getElementById("step-energy");
const feedback = document.getElementById("feedback");
const timerText = document.getElementById("timerText");
const activityNameEl = document.getElementById("activityName");
const activityImg = document.getElementById("activityImg");

const nextPause = document.getElementById("nextPause");
const nextTime = document.getElementById("nextTime");
const changeInterval = document.getElementById("changeInterval");
const inlineInterval = document.getElementById("inlineInterval");
const inlineInput = document.getElementById("inlineInput");

/* ---------- SETTINGS ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsModal = document.getElementById("settingsModal");
const closeSettings = document.getElementById("closeSettings");
const nameInput = document.getElementById("nameInput");

/* ---------- FEED ---------- */
const feedBtn = document.getElementById("feedBtn");
const feedModal = document.getElementById("feedModal");
const closeFeed = document.getElementById("closeFeed");
const feed = document.getElementById("feed");

/* ---------- ACTIVITIES ---------- */
const acts = [
  { t: "Lægløft", i: "images/laegloeft.png" },
  { t: "Squats", i: "images/squats.png" },
  { t: "Armcirkler", i: "images/armcirkel.png" }
];

/* ---------- AUDIO (pre-authorize + done sound) ---------- */
/* done.mp3 skal ligge i samme mappe eller være en gyldig sti */
const doneAudio = new Audio("done.mp3");
doneAudio.preload = "auto";
doneAudio.volume = 1;

/* Helper: for-browser autoplay permission unlock
   Play muted briefly on first user gesture so later plays are allowed. */
function unlockAudio() {
  // Try to play muted once; ignore errors.
  try {
    const p = doneAudio.play();
    if (p && typeof p.then === "function") {
      // If browser requires a user gesture, this call is already inside a click handler.
      // Pause immediately so user doesn't hear it.
      p.then(() => {
        doneAudio.pause();
        doneAudio.currentTime = 0;
      }).catch(() => {
        // ignore
      });
    }
  } catch (e) {
    // ignore
  }
}

/* ---------- REMINDER ---------- */
let REMINDER_INTERVAL = (localStorage.getItem("reminderInterval") || 25) * 60000;
let reminderTimer = null;

function showReminder() {
  stepStart.classList.remove("hidden");
  feedback.classList.add("hidden");
  nextPause.classList.add("hidden");
}

function scheduleReminder() {
  if (reminderTimer) clearTimeout(reminderTimer);
  reminderTimer = setTimeout(showReminder, REMINDER_INTERVAL);
}

function updateNextPause() {
  const t = new Date(Date.now() + REMINDER_INTERVAL);
  nextTime.textContent = t.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
}

/* ---------- FLOW (timer + audio on finish) ---------- */
let activityTimerInterval = null;

startBtn.addEventListener("click", () => {
  // Unlock audio permission on first user gesture
  unlockAudio();

  const a = acts[Math.random()*acts.length | 0];
  activityNameEl.textContent = a.t;
  activityImg.src = a.i;

  stepStart.classList.add("hidden");
  stepActivity.classList.remove("hidden");

  // 2 minutes countdown (120s)
  let s = 120;
  const tick = () => {
    timerText.textContent = `${(s/60|0)}:${String(s%60).padStart(2,"0")}`;
    if (s-- <= 0) {
      // stop interval
      clearInterval(activityTimerInterval);
      activityTimerInterval = null;

      // play done sound (best-effort, catch errors)
      try {
        // Reset to start in case it's been used
        doneAudio.currentTime = 0;
        const playPromise = doneAudio.play();
        if (playPromise && typeof playPromise.then === "function") {
          playPromise.catch(() => {
            // If play fails, ignore silently (browser policy or other)
          });
        }
      } catch (e) {
        // ignore
      }

      // transition to energy step
      stepActivity.classList.add("hidden");
      stepEnergy.classList.remove("hidden");
    }
  };
  tick();
  activityTimerInterval = setInterval(tick, 1000);
});

/* Energy buttons: record choice, show next pause and schedule reminder */
document.querySelectorAll("#step-energy button").forEach(btn => {
  btn.addEventListener("click", () => {
    stepEnergy.classList.add("hidden");
    feedback.textContent = "Tak! Næste pause planlagt.";
    feedback.classList.remove("hidden");

    updateNextPause();
    nextPause.classList.remove("hidden");

    scheduleReminder();
  });
});

/* ---------- INLINE INTERVAL EDIT ---------- */
changeInterval.onclick = () => {
  // show inline editor with whole minutes only
  inlineInput.value = Math.max(1, Math.round(REMINDER_INTERVAL / 60000));
  inlineInterval.classList.remove("hidden");
  inlineInterval.setAttribute("aria-hidden", "false");
  inlineInput.focus();
  inlineInput.select();
};

// Save on blur or Enter key; only whole minutes allowed (step=1)
inlineInput.addEventListener("blur", saveInlineInterval);
inlineInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    inlineInput.blur();
  } else if (e.key === "Escape") {
    inlineInterval.classList.add("hidden");
    inlineInterval.setAttribute("aria-hidden", "true");
  }
});

function saveInlineInterval() {
  const m = Number(inlineInput.value);
  if (Number.isFinite(m) && m >= 1) {
    const minutes = Math.round(m);
    REMINDER_INTERVAL = minutes * 60000;
    localStorage.setItem("reminderInterval", minutes);
    updateNextPause();
    scheduleReminder();
  }
  inlineInterval.classList.add("hidden");
  inlineInterval.setAttribute("aria-hidden", "true");
}

/* ---------- SETTINGS ---------- */
settingsBtn.onclick = () => settingsModal.classList.remove("hidden");
closeSettings.onclick = () => {
  localStorage.setItem("name", nameInput.value || "Bruger");
  settingsModal.classList.add("hidden");
  document.getElementById("username").textContent = nameInput.value || "Bruger";
};

/* ---------- FEED ---------- */
feedBtn.onclick = async () => {
  feedModal.classList.remove("hidden");
  feed.textContent = "Indlæser…";

  try {
    const r = await fetch("https://flowfocus-aa-2704.jakobhelkjaer.workers.dev/api/team_feed?team_id=demo&limit=20");
    const rows = await r.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      feed.textContent = "Ingen pauser endnu.";
      return;
    }
    feed.innerHTML = rows
      .map(r => `${r.display_name || "Ukendt"}: ${r.activity || "Aktivitet"}`)
      .join("<br>");
  } catch (e) {
    feed.textContent = "Kunne ikke hente feed.";
  }
};

closeFeed.onclick = () => feedModal.classList.add("hidden");

/* ---------- INIT ---------- */
updateNextPause();
scheduleReminder();
</script>

</body>
</html>
