<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Flow Focus</title>
</head>
<body>

<h1>Hej 👋</h1>

<!-- Flow Focus interaktiv boks -->
<div id="ff-box" hidden>

  <!-- STEP 1: Energi før aktivitet (VAS 0–100) -->
  <div id="ff-step-energy-before">
    <h4>Hvordan er din energi lige nu?</h4>
    <p>Klik på et tal fra 0–100</p>

    <div id="ff-vas-before" style="display:flex; flex-wrap:wrap; gap:4px; width:260px;"></div>
  </div>

  <!-- STEP 2: Aktivitet -->
  <div id="ff-step-activity" hidden>
    <p id="ff-activity-text">Aktivitet: Stræk skuldrene i 20 sek.</p>
    <button id="ff-done-btn">Jeg har gjort det</button>
  </div>

  <!-- STEP 3: Energi efter aktivitet (VAS 0–100) -->
  <div id="ff-step-energy-after" hidden>
    <h4>Hvordan er din energi nu?</h4>
    <p>Klik på et tal fra 0–100</p>

    <div id="ff-vas-after" style="display:flex; flex-wrap:wrap; gap:4px; width:260px;"></div>
  </div>

</div>

<!-- STEP 4: Graf -->
<div id="ff-graph-section" hidden>
  <h3>Din energi over tid</h3>
  <canvas id="ff-graph" width="400" height="200" style="border:1px solid black;"></canvas>
</div>

<!-- Microfeedback vises her -->
<p id="ff-resultat"></p>

<script>
// Helper: lav en VAS-linje med 101 klikbare felter (0–100)
function createFullVAS(containerId, callback) {
  const container = document.getElementById(containerId);

  for (let i = 0; i <= 100; i++) {
    const box = document.createElement("div");
    box.style.width = "28px";
    box.style.height = "28px";
    box.style.border = "1px solid black";
    box.style.cursor = "pointer";
    box.style.display = "flex";
    box.style.alignItems = "center";
    box.style.justifyContent = "center";
    box.style.fontSize = "10px";

    box.textContent = i;

    box.onclick = () => callback(i);

    container.appendChild(box);
  }
}

let energyBefore = null;

// Gem data i localStorage
function saveMeasurement(before, after) {
  const data = JSON.parse(localStorage.getItem("ff-data") || "[]");
  data.push({ before, after, time: Date.now() });
  localStorage.setItem("ff-data", JSON.stringify(data));
}

// Tegn graf
function drawGraph() {
  const data = JSON.parse(localStorage.getItem("ff-data") || "[]");
  const canvas = document.getElementById("ff-graph");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (data.length === 0) return;

  const maxY = 100;
  const stepX = canvas.width / (data.length - 1 || 1);

  ctx.beginPath();
  ctx.strokeStyle = "black";

  data.forEach((d, i) => {
    const x = i * stepX;
    const y = canvas.height - (d.after / maxY) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();

  // Tegn punkter
  data.forEach((d, i) => {
    const x = i * stepX;
    const y = canvas.height - (d.after / maxY) * canvas.height;

    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "black";
    ctx.fill();
  });
}

// Vis boksen når siden åbner
window.onload = () => {
  document.getElementById("ff-box").hidden = false;

  createFullVAS("ff-vas-before", (val) => {
    energyBefore = val;
    document.getElementById("ff-step-energy-before").hidden = true;
    document.getElementById("ff-step-activity").hidden = false;
  });

  createFullVAS("ff-vas-after", (val) => {
    const energyAfter = val;

    saveMeasurement(energyBefore, energyAfter);

    document.getElementById("ff-resultat").textContent =
      "Selv om effekten af en mikropause kan variere fra gang til gang, " +
      "viser forskning, at mikropauser generelt øger energien og mindsker træthed. " +
      "I grafen kan du se, hvordan mikropauser har virket på dig over tid.";

    document.getElementById("ff-box").hidden = true;

    // Vis graf
    document.getElementById("ff-graph-section").hidden = false;
    drawGraph();
  });
};

// STEP 2 → STEP 3
document.getElementById("ff-done-btn").onclick = () => {
  document.getElementById("ff-step-activity").hidden = true;
  document.getElementById("ff-step-energy-after").hidden = false;
};
</script>

</body>
