<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v150</title>

<style>
body{font-family:system-ui;padding:16px}
.hidden{display:none}
#img{max-width:200px;margin-top:10px}
#feed{margin-top:20px;font-size:.9rem;color:#444}
#nameModal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#0008;display:flex;align-items:center;justify-content:center;
}
#nameBox{
  background:white;padding:20px;border-radius:8px;max-width:300px;width:90%;
}
#adminPanel{
  margin-top:30px;
  padding:16px;
  border:1px solid #ccc;
  border-radius:8px;
}
#adminPanel table{
  width:100%;
  border-collapse:collapse;
  font-size:.9rem;
}
#adminPanel th,#adminPanel td{
  border-bottom:1px solid #ddd;
  padding:6px;
  text-align:left;
}
#adminPanel button{
  padding:4px 8px;
  font-size:.8rem;
}
</style>
</head>

<body>

<div id="nameModal" class="hidden">
  <div id="nameBox">
    <h3>Hvad vil du kaldes?</h3>
    <input id="nameInput" style="width:100%;padding:8px;font-size:1rem">
    <button id="nameSave" style="margin-top:10px;width:100%">
