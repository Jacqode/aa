<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v57</title>

<style>
  body{
    font-family:system-ui;
    margin:0;
    padding:20px;
    background:#fff;
    color:#111;
  }

  .section{margin:6px 0 8px 0}

  button,input{
    padding:10px 16px;
    font-size:0.95rem;
    border-radius:8px;
    border:1px solid #ccc;
    background:#fafafa;
    cursor:pointer;
    margin:4px;
  }

  input{padding:8px}
  .active{background:#111;color:#fff}

  /* Ens typografi og spacing for alle tekstdele */
  #chosenExerciseDisplay,
  #timer,
  #thanks{
    font-size:18px;
    line-height:1.3;
    margin-left:0;
    margin-top:4px;
    margin-bottom:4px;
    min-height:20px;
  }

  #latestList{
    white-space:pre-line;
    font-size:18px;
    line-height:1.3;
  }
</style>
</head>
<body>

<div style="font-size:18px; margin-bottom:10px; line-height:1.3;">
  Hej <span id="welcomeName">ven</span> 👋
  <br><br>
  <!-- Intro-tekst fjernet -->
</div>

<div class="section">
  <!-- Kun én knap tilbage -->
  <button class="exerciseBtn" data-ex="random">✨ Få en energipause</button>
</div>

<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>

<div id="thanks" style="display:none; margin-top:20px;"></div>

<details id="teamToggle" style="margin-top:30px; margin-bottom:20px;">
  <summary style="cursor:pointer; font-size:16px; font-weight:500;">
    Team statistik
  </summary>

  <div style="margin-top:12px;">
    <div id="statTotal" style="margin-bottom:8px; color:#444;"></div>
    <div style="font-weight:400; margin-bottom:6px;">Seneste pauser:</div>
    <div id="latestList"></div>
  </div>
</details>

<details style="margin-top:20px;">
  <summary style="font-weight:600;">Indstillinger</summary>

  <div style="margin-top:12px">
    <div>Dit navn:</div>
    <input id="nameInput" type="text" placeholder="Skriv dit navn">
    <br><br>

    <div>Interval til næste pause:</div>
    <button class="intervalBtn" data-int="30">30 sek</button>
    <button class="intervalBtn" data-int="1500">25 min</button>
    <button class="intervalBtn" data-int="1800">30 min</button>
    <button class="intervalBtn" data-int="2400">40 min</button>

    <br><br>
    <div>Varighed (energipause):</div>
    <button class="timeBtn" data-time="30">30 sek</button>
    <button class="timeBtn" data-time="60">1 min</button>
    <button class="timeBtn" data-time="120">2 min</button>
  </div>
</details>

<script>
const WORKER_URL = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";
const api = (p) => WORKER_URL.replace(/\/+$/,"") + p;

const nameInput = document.getElementById("nameInput");
const welcomeName = document.getElementById("welcomeName");
const timerEl = document.getElementById("timer");
const chosenExerciseDisplay = document.getElementById("chosenExerciseDisplay");
const thanks = document.getElementById("thanks");
const statTotal = document.getElementById("statTotal");
const latestList = document.getElementById("latestList");

let chosenExercise = "random";
let chosenTime = Number(localStorage.getItem("time") || 60);
let chosenInterval = Number(localStorage.getItem("interval") || 1500);
let timerId = null;
let pauseStart = null;
let reminderTimeoutId = null;

function bindButtons(selector, stateKey, callback) {
  document.querySelectorAll(selector).forEach(btn => {
    const val = btn.dataset.ex || btn.dataset.time || btn.dataset.int;

    if (Number(val) === window[stateKey] || val === window[stateKey]) {
      btn.classList.add("active");
    }

    btn.onclick = () => {
      document.querySelectorAll(selector).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      if (selector !== ".exerciseBtn") {
        window[stateKey] = isNaN(val) ? val : Number(val);
        localStorage.setItem(stateKey.replace("chosen","").toLowerCase(), window[stateKey]);
      }

      callback && callback(btn);
    };
  });
}

nameInput.value = localStorage.getItem("name") || "";
welcomeName.textContent = nameInput.value || "ven";
nameInput.oninput = () => {
  localStorage.setItem("name", nameInput.value);
  welcomeName.textContent = nameInput.value || "ven";
};

function setFeedback() {
  const t = new Date(Date.now() + chosenInterval * 1000)
    .toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"});
  thanks.textContent = `Godt gået! 🙌\nNæste pause er kl. ${t}`;
}

bindButtons(".intervalBtn", "chosenInterval");
bindButtons(".timeBtn", "chosenTime");

/* Kun én knap → random vælger øvelse */
bindButtons(".exerciseBtn", "chosenExercise", () => {

  const list = ["Squats","Knæløft","Armsving"];
  chosenExercise = list[Math.floor(Math.random() * list.length)];

  chosenExerciseDisplay.textContent = `Du laver ${chosenExercise}.`;

  startTimer();
});

function scheduleReminder() {
  if (Notification.permission !== "granted") return;

  reminderTimeoutId = setTimeout(() => {
    new Notification("Tid til en ny energipause ✨", {
      body: "Vil du lade op igen?",
      icon: "icon.png"
    });
  }, chosenInterval * 1000);
}

function rescheduleReminder() {
  if (reminderTimeoutId) clearTimeout(reminderTimeoutId);
  scheduleReminder();
}

function startTimer() {
  thanks.style.display = "none";

  const audio = new Audio("done.mp3");
  audio.volume = 0;
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
  });

  let s = chosenTime;
  pauseStart = Date.now();
  timerEl.textContent = format(s);

  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    timerEl.textContent = format(s);

    if (s-- <= 0) {
      new Audio("done.mp3").play();
      clearInterval(timerId);
      timerId = null;

      timerEl.textContent = "Energipausen er slut.";

      finishPause();
    }

  }, 1000);
}

function format(sec) {
  const m = sec / 60 | 0;
  const s = sec % 60;
  return `${m} min ${String(s).padStart(2,'0')} sek`;
}

async function refreshFeed() {
  const team = new URLSearchParams(location.search).get("team") || "default";

  const res = await fetch(api(`/feed?team=${team}`), { cache:"no-store" });
  const data = await res.json();
  const items = data.feed || [];

  const total = items.length;

  const latest = {};
  items.forEach(i => {
    if (!latest[i.name] || i.ts > latest[i.name].ts) latest[i.name] = i;
  });

  statTotal.textContent = `${total} energipauser i alt`;

  latestList.textContent = Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .map(i => `${{
      "Squats":"🦵",
      "Knæløft":"🏃",
      "Armsving":"💨"
    }[i.exercise] || "✨"} ${i.name}: ${i.exercise}`)
    .join("\n");
}

async function finishPause() {
  if (!pauseStart) return;

  const duration = Math.round((Date.now() - pauseStart) / 1000);

  rescheduleReminder();

  const payload = {
    team_id: new URLSearchParams(location.search).get("team") || "default",
    name: nameInput.value || "Ukendt",
    exercise: chosenExercise,
    duration
  };

  await fetch(api("/event"), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload),
    cache:"no-store"
  });

  await refreshFeed();

  setFeedback();
  thanks.style.display = "block";
}

setInterval(refreshFeed, 3000);
refreshFeed();
</script>

</body>
</html>
