<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Flow Focus</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="ff-box" hidden>

  <div id="ff-step-activity" hidden>
    <p id="ff-activity-text"></p>

    <!-- Aktivitets-timer -->
    <div id="ff-activity-timer" style="margin-top:10px;">
      <button id="ff-start-activity">Start 2-minutters timer</button>
      <div id="ff-activity-countdown" style="font-size:1.4rem; margin-top:6px;" hidden>2:00</div>
    </div>

    <!-- Illustration -->
    <img id="ff-activity-image" alt="Øvelse" style="max-width:200px; margin-top:10px;" hidden>

    <button id="ff-done-btn" style="margin-top:12px;">Jeg har gjort det</button>

    <p id="ff-microfeedback" style="margin-top:10px; font-weight:500;" hidden></p>
    <p id="ff-countdown" style="margin-top:6px; font-size:14px; color:#555;" hidden></p>

    <p style="margin-top:12px;">
      <a href="#" id="ff-settings-toggle">⚙️ Indstillinger</a>
    </p>

    <div id="ff-settings" hidden>
      <h4>Påmindelser</h4>
      <input id="ff-reminder-input" type="number" min="1" style="width:60px;"> minutter
      <br><br>
      <button id="ff-reminder-save">Gem</button>
      <button id="ff-reminder-disable">Slå fra</button>
      <p id="ff-reminder-feedback"></p>
    </div>
  </div>

</div>

<script>
let countdownInterval = null;
let activityInterval = null;

/* ---------------- Service worker ---------------- */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* ---------------- Notifikationstilladelse ---------------- */
async function requestNotificationPermission() {
  const permission = await Notification.requestPermission();
  return permission === "granted";
}

/* ---------------- OS-notifikation (den vigtige funktion) ---------------- */
function sendReminderNotification() {
  if (Notification.permission !== "granted") return;

  navigator.serviceWorker.getRegistration().then(reg => {
    if (reg) {
      reg.showNotification("Flow Focus", {
        body: "Tid til en aktiv mikropause – tryk for at åbne Flow Focus",
        icon: "icon-192.png",
        badge: "icon-192.png",
        data: { url: "https://jacqode.github.io/aa" }
      });
    }
  });
}

/* ---------------- Activities ---------------- */
const ffActivities = [
  { title: "Gang på stedet i 2 min", text: "Gå roligt på stedet med lette skridt.", duration: 2, image: "images/gang.png" },
  { title: "Lægløft i 2 min", text: "Løft og sænk hælene roligt for at aktivere lægmusklerne.", duration: 2, image: "images/laegloeft.png" },
  { title: "Rejs og sæt dig i 2 min", text: "Rejs dig roligt og sæt dig igen.", duration: 2, image: "images/rejs.png" },
  { title: "Armcirkler i 2 min", text: "Stræk armene ud til siderne og lav store cirkler fremad og baglæns.", duration: 2, image: "images/armcirkel.png" },
  { title: "Benstræk i 2 min", text: "Stræk ét ben ad gangen og hold kort, før du skifter.", duration: 2, image: "images/benstraek.png" }
];

function getRandomActivity() {
  return ffActivities[Math.floor(Math.random() * ffActivities.length)];
}

/* ---------------- Microfeedback ---------------- */
function formatMicrofeedback(count) {
  return count === 1 ? `${count} mikropause gennemført.` : `${count} mikropauser gennemført.`;
}

/* ---------------- Aktivitet ---------------- */
function showActivity() {
  const a = getRandomActivity();

  document.getElementById("ff-activity-text").textContent =
    `${a.title} – ${a.text}`;

  const imgEl = document.getElementById("ff-activity-image");
  if (a.image) {
    imgEl.src = a.image;
    imgEl.hidden = false;
  } else {
    imgEl.hidden = true;
  }

  const btn = document.getElementById("ff-start-activity");
  btn.onclick = () => {
    clearInterval(activityInterval);
    startActivityTimer(a.duration);
  };

  document.getElementById("ff-step-activity").hidden = false;
}

/* ---------------- Timer ---------------- */
function startActivityTimer(minutes) {
  let seconds = minutes * 60;
  const display = document.getElementById("ff-activity-countdown");

  display.hidden = false;
  updateDisplay();

  activityInterval = setInterval(() => {
    seconds--;
    updateDisplay();

    if (seconds <= 0) {
      clearInterval(activityInterval);
      playActivityDoneSound();
    }
  }, 1000);

  function updateDisplay() {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    display.textContent = `${m}:${s.toString().padStart(2, "0")}`;
  }
}

function playActivityDoneSound() {
  const audio = new Audio("done.mp3");
  audio.play();
}

/* ---------------- Reset ---------------- */
function resetUI() {
  document.getElementById("ff-microfeedback").hidden = true;
  document.getElementById("ff-countdown").hidden = true;
  document.getElementById("ff-activity-text").hidden = false;
  document.getElementById("ff-done-btn").hidden = false;
  localStorage.removeItem("ff-next-pause-time");
  showActivity();
}

/* ---------------- Reminder timer ---------------- */
function startReminderTimer() {
  const stored = Number(localStorage.getItem("ff-reminder-interval"));
  const interval = stored > 0 ? stored : 25;   // ← standard 25 min
  localStorage.setItem("ff-reminder-interval", interval);

  const nextTime = Date.now() + interval * 60000;
  localStorage.setItem("ff-next-pause-time", nextTime);
  startCountdown();
}

function startCountdown() {
  const el = document.getElementById("ff-countdown");
  el.hidden = false;
  if (countdownInterval) clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {
    const nextTime = Number(localStorage.getItem("ff-next-pause-time"));
    const diff = nextTime - Date.now();

    if (diff <= 0) {
      clearInterval(countdownInterval);
      sendReminderNotification();   // ← OS-NOTIFIKATION FYRES HER
      resetUI();
      return;
    }

    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    el.textContent = `Næste aktivitet er om: ${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }, 1000);
}

/* ---------------- Done ---------------- */
document.getElementById("ff-done-btn").onclick = () => {
  const count = Number(localStorage.getItem("ff-pause-count") || 0) + 1;
  localStorage.setItem("ff-pause-count", count);

  document.getElementById("ff-activity-text").hidden = true;
  document.getElementById("ff-done-btn").hidden = true;

  const fb = document.getElementById("ff-microfeedback");
  fb.textContent = formatMicrofeedback(count);
  fb.hidden = false;

  startReminderTimer();
};

/* ---------------- Settings ---------------- */
document.getElementById("ff-settings-toggle").onclick = e => {
  e.preventDefault();
  document.getElementById("ff-settings").hidden =
    !document.getElementById("ff-settings").hidden;
};

document.getElementById("ff-reminder-save").onclick = async () => {
  const m = Number(document.getElementById("ff-reminder-input").value);
  if (m > 0) {
    localStorage.setItem("ff-reminder-interval", m);
  }

  const ok = await requestNotificationPermission();
  document.getElementById("ff-reminder-feedback").textContent =
    ok ? "Påmindelser aktiveret." : "Tillad notifikationer for at få påmindelser.";

  startReminderTimer();   // ← DENNE LINJE ER AFGØRENDE
};

document.getElementById("ff-reminder-disable").onclick = () => {
  localStorage.removeItem("ff-reminder-interval");
  localStorage.removeItem("ff-next-pause-time");
  document.getElementById("ff-reminder-feedback").textContent = "Slået fra.";
  document.getElementById("ff-countdown").hidden = true;
  if (countdownInterval) clearInterval(countdownInterval);
};

/* ---------------- Init ---------------- */
window.onload = () => {
  document.getElementById("ff-box").hidden = false;

  const defaultInterval = 25;
  document.getElementById("ff-reminder-input").value =
    localStorage.getItem("ff-reminder-interval") || defaultInterval;

  showActivity();

  if (localStorage.getItem("ff-next-pause-time")) {
    document.getElementById("ff-countdown").hidden = false;
    startCountdown();
  }
};
</script>

</body>
</html>
