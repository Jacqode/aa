<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flow Focus v171</title>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      padding: 16px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .section-title {
      font-weight: 600;
      margin: 6px 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hidden { display: none !important; }

    #ff-activity-image {
      max-width: 200px;
      margin-top: 10px;
      display: block;
      min-height: 120px;
    }

    #ff-activity-countdown {
      font-size: 1.4rem;
      margin-top: 6px;
    }

    .energy-buttons button {
      margin: 6px 6px 0 0;
    }

    .ff-sep {
      margin: 18px 0;
      opacity: .18;
      border: 0;
      border-top: 1px solid rgba(0,0,0,.08);
    }

    footer.branding {
      margin-top: 40px;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <!-- 🔝 TOPLINJE -->
  <h2>Hej Jakob – team psy</h2>

  <!-- 1️⃣ START TIMER -->
  <div class="section-title">1. Start timer</div>
  <button id="startTimerBtn">Start 2 min</button>

  <hr class="ff-sep">

  <!-- 2️⃣ AKTIVITET -->
  <div id="ff-box" class="hidden">
    <div class="section-title">2. Aktivitet: <span id="ff-activity-name"></span></div>

    <img id="ff-activity-image" src="" alt="">
    <div id="ff-activity-countdown"></div>

    <p>Lav så mange som muligt i dit eget tempo, indtil tiden er gået.</p>
  </div>

  <hr class="ff-sep">

  <!-- 3️⃣ ENERGI -->
  <div id="ff-energy-section" class="hidden">
    <div class="section-title">3. Hvordan føles din energi efter pausen?</div>

    <div class="energy-buttons">
      <button data-energy="større">Større</button>
      <button data-energy="samme">Samme</button>
      <button data-energy="mindre">Mindre</button>
      <button data-energy="ved ikke">Ved ikke</button>
    </div>
  </div>

  <hr class="ff-sep">

  <!-- TEAM FEED -->
  <h3>Teamets seneste pauser</h3>
  <div id="team-feed"></div>
  <div class="small-note">Feedet opdateres automatisk hvert 15. sekund.</div>

  <!-- FOOTER / LOGO -->
  <footer class="branding">
    <div>Flow Focus</div>
    <div>Korte pauser til at støtte din energi.</div>
  </footer>

  <script>
    // JS bevares som i v170 – du kan indsætte din eksisterende JS her.
  </script>

</body>
</html>
