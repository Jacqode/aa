<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Flow Focus</title>
</head>
<body>

<h1>Hej 👋</h1>

<!-- Flow Focus interaktiv boks -->
<div id="ff-box" hidden>

  <!-- Step 1: Aktivitet -->
  <div id="ff-step-activity">
    <p id="ff-activity-text">Aktivitet: Stræk skuldrene i 20 sek.</p>
    <button id="ff-done-btn">Jeg har gjort det</button>
  </div>

  <!-- Step 2: Energi -->
  <div id="ff-step-energy" hidden>
    <h4>Hvordan er din energi nu?</h4>
    <button data-energy="mindre">Mindre</button>
    <button data-energy="uændret">Uændret</button>
    <button data-energy="større">Større</button>
    <button data-energy="ved_ikke">Ved ikke</button>
  </div>

</div>

<script>
// Vis boksen når siden åbner
window.onload = () => {
  document.getElementById("ff-box").hidden = false;
};

// Step 1 → Step 2
document.getElementById("ff-done-btn").onclick = () => {
  document.getElementById("ff-step-activity").hidden = true;
  document.getElementById("ff-step-energy").hidden = false;
};

// Step 2 → afslut
document.querySelectorAll("#ff-step-energy button").forEach(btn => {
  btn.onclick = () => {
    const energy = btn.dataset.energy;
    alert("Tak! Du valgte: " + energy);

    // Luk boksen
    document.getElementById("ff-box").hidden = true;
  };
});
</script>

</body>
</html>
