<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v34 test</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  .section{margin:10px 0 20px 0}
  button,input{
    padding:10px 16px;font-size:0.95rem;border-radius:8px;
    border:1px solid #ccc;background:#fafafa;cursor:pointer;margin:4px
  }
  input{padding:8px}
  .active{background:#111;color:#fff}
  #timer{font-size:26px;margin:10px 0 20px 0;min-height:32px}
  #chosenExerciseDisplay{font-size:18px;margin-top:10px;min-height:24px}
  #thanks,#teamStats,#latestList{white-space:pre-line}
</style>
</head>
<body>

<div style="font-size:18px; margin-bottom:10px;">
  Hej <span id="welcomeName">ven</span> 👋
  <br><br>
  Få en energipause med et klik:
</div>

<div class="section">
  <button class="exerciseBtn" data-ex="Armstræk">💪 Armstræk</button>
  <button class="exerciseBtn" data-ex="Squats">🦵 Squats</button>
  <button class="exerciseBtn" data-ex="Stræk">🤸 Stræk</button>
  <button class="exerciseBtn" data-ex="random">🎲 Overrask mig!</button>
</div>

<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>

<button id="finishBtn">Færdig nu</button>

<div id="thanks" style="display:none; margin-top:20px;"></div>

<div id="teamStats" style="display:none; margin-top:20px;">
  <div style="font-weight:600; margin-bottom:6px;">Team statistik</div>
  <ul style="margin:0; padding-left:20px;">
    <li id="statTotal"></li>
    <li>Seneste energipauser er:</li>
  </ul>
  <div id="latestList" style="margin-top:6px;"></div>
</div>

<details style="margin-top:40px;">
  <summary>Indstillinger</summary>
  <div style="margin-top:12px">
    <div>Dit navn:</div>
    <input id="nameInput" type="text" placeholder="Skriv dit navn">
    <br><br>

    <div>Interval til næste pause:</div>
    <button class="intervalBtn" data-int="30">30 sek</button>
    <button class="intervalBtn" data-int="1500">25 min</button>
    <button class="intervalBtn" data-int="1800">30 min</button>
    <button class="intervalBtn" data-int="2400">40 min</button>

    <br><br>
    <div>Varighed (energipause):</div>
    <button class="timeBtn" data-time="30">30 sek</button>
    <button class="timeBtn" data-time="60">1 min</button>
    <button class="timeBtn" data-time="120">2 min</button>
  </div>
</details>

<script>
const WORKER_URL = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";
const api = (p) => WORKER_URL.replace(/\/+$/,"") + p;

// UI refs
const nameInput = document.getElementById("nameInput");
const welcomeName = document.getElementById("welcomeName");
const timerEl = document.getElementById("timer");
const chosenExerciseDisplay = document.getElementById("chosenExerciseDisplay");
const finishBtn = document.getElementById("finishBtn");
const thanks = document.getElementById("thanks");
const teamStats = document.getElementById("teamStats");
const statTotal = document.getElementById("statTotal");
const latestList = document.getElementById("latestList");

// State
let chosenExercise = "random";
let chosenTime = Number(localStorage.getItem("time") || 60);
let chosenInterval = Number(localStorage.getItem("interval") || 1500);
let timerId = null;
let pauseStart = null;
let latestFeedCache = [];

// ⭐ GENERIC BUTTON BINDER
function bindButtons(selector, stateKey, callback) {
  document.querySelectorAll(selector).forEach(btn => {
    const val = btn.dataset.ex || btn.dataset.time || btn.dataset.int;

    if (Number(val) === window[stateKey] || val === window[stateKey]) {
      btn.classList.add("active");
    }

    btn.onclick = () => {
      document.querySelectorAll(selector).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      window[stateKey] = isNaN(val) ? val : Number(val);
      localStorage.setItem(stateKey.replace("chosen","").toLowerCase(), window[stateKey]);

      callback && callback(btn);
    };
  });
}

// ⭐ Name
nameInput.value = localStorage.getItem("name") || "";
welcomeName.textContent = nameInput.value || "ven";
nameInput.oninput = () => {
  localStorage.setItem("name", nameInput.value);
  welcomeName.textContent = nameInput.value || "ven";
};

// ⭐ Microfeedback
function setFeedback() {
  const t = new Date(Date.now() + chosenInterval * 1000)
    .toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"});
  thanks.textContent = `Godt gået! 🙌\nNæste pause er kl. ${t}`;
}

// ⭐ Bind interval + time + exercise
bindButtons(".intervalBtn", "chosenInterval", () => {
  chosenInterval = Number(localStorage.getItem("interval"));
  if (thanks.style.display === "block") setFeedback();
});

bindButtons(".timeBtn", "chosenTime");

bindButtons(".exerciseBtn", "chosenExercise", (btn) => {
  if (btn.dataset.ex === "random") {
    const list = ["Armstræk","Squats","Stræk"];
    chosenExercise = list[Math.random()*list.length|0];
  }
  chosenExerciseDisplay.textContent = "";
  startTimer();
});

// ⭐ Timer
function startTimer() {
  thanks.style.display = "none";
  teamStats.style.display = "none";

  // ⭐ Pre-authorize done.mp3 (krævet for at lyd må spille ved timer-slut)
  const audio = new Audio("done.mp3");
  audio.volume = 0;
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
  });

  let s = chosenTime;
  pauseStart = Date.now();
  timerEl.textContent = format(s);

  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    timerEl.textContent = format(s);

    if (s-- <= 0) {
      new Audio("done.mp3").play();   // ⭐ Lyd ved timer-slut
      finishPause();
    }

  }, 1000);
}

function format(sec) {
  const m = sec / 60 | 0;
  const s = sec % 60;
  return `${m} min ${String(s).padStart(2,'0')} sek`;
}

finishBtn.onclick = finishPause;

// ⭐ OS notification
function scheduleNotification() {
  if (Notification.permission !== "granted") return;
  setTimeout(() => {
    new Notification("Tid til en ny energipause ✨", {
      body: "Vil du lade op igen?",
      icon: "icon.png"
    });
  }, chosenInterval * 1000);
}

// ⭐ Feed + feedback samlet
async function refreshFeed() {
  const team = new URLSearchParams(location.search).get("team") || "default";

  const res = await fetch(
    api(`/feed?team=${team}`),
    { cache:"no-store" }
  );

  const data = await res.json();
  latestFeedCache = data.feed || [];

  const items = latestFeedCache;
  const total = items.length;

  const latest = {};
  items.forEach(i => {
    if (!latest[i.name] || i.ts > latest[i.name].ts) latest[i.name] = i;
  });

  statTotal.textContent = `I har ladt op med i alt ${total} energipauser`;

  latestList.textContent = Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .map(i => `${{"Armstræk":"💪","Squats":"🦵","Stræk":"🤸"}[i.exercise] || "✨"} ${i.name}: ${i.exercise}`)
    .join("\n");

  teamStats.style.display = "block";
}

// ⭐ Finish pause
async function finishPause() {
  clearInterval(timerId);
  timerId = null;

  const duration = Math.round((Date.now() - pauseStart) / 1000);

  const payload = {
    team_id: new URLSearchParams(location.search).get("team") || "default",
    name: nameInput.value || "Ukendt",
    exercise: chosenExercise,
    duration
  };

  await fetch(api("/event"), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload),
    cache:"no-store"
  });

  await refreshFeed();

  setFeedback();
  thanks.style.display = "block";

  scheduleNotification();
}

setInterval(refreshFeed, 3000);
refreshFeed();
</script>

</body>
</html>
