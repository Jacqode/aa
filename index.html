<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v24</title>

<style>
  body{
    font-family:system-ui;
    margin:0;
    padding:20px;
    background:#fff;
    color:#111;
    font-weight:400;
  }

  .section{
    margin:10px 0 20px 0;
  }

  button{
    padding:10px 16px;
    font-size:0.95rem;
    border-radius:8px;
    border:1px solid #ccc;
    background:#fafafa;
    cursor:pointer;
    margin:4px;
    font-weight:400;
  }

  .active{background:#111;color:#fff}

  #timer{
    font-size:26px;
    margin:10px 0 20px 0;
    min-height:32px;
    font-weight:400;
  }

  input{
    padding:8px;
    font-size:0.95rem;
    border-radius:6px;
    border:1px solid #ccc;
    margin:4px 0;
    font-weight:400;
  }

  #chosenExerciseDisplay{
    font-size:18px;
    margin-top:10px;
    min-height:24px;
    font-weight:400;
  }
</style>
</head>
<body>

<div style="font-size:18px; margin-bottom:10px;">
  Hej <span id="welcomeName">ven</span> 👋
  <br><br>
  Få en energipause med et klik:
</div>

<div class="section">
  <button class="exerciseBtn" data-ex="Armstræk">💪 Armstræk</button>
  <button class="exerciseBtn" data-ex="Squats">🦵 Squats</button>
  <button class="exerciseBtn" data-ex="Stræk">🤸 Stræk</button>
  <button class="exerciseBtn" data-ex="random">🎲 Overrask mig!</button>
</div>

<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>

<button id="finishBtn" style="margin-top:10px;">Færdig nu</button>

<!-- Microfeedback -->
<div id="thanks" style="display:none;margin-top:20px; white-space:pre-line;"></div>

<!-- Team statistik -->
<div id="teamStats" style="display:none; margin-top:20px;">
  <div style="font-weight:600; margin-bottom:6px;">Team statistik</div>
  <ul style="margin:0; padding-left:20px;">
    <li id="statTotal"></li>
    <li>Seneste energipauser er:</li>
  </ul>
  <div id="latestList" style="margin-top:6px; white-space:pre-line;"></div>
</div>

<details style="margin-top:40px;">
  <summary>Indstillinger</summary>
  <div style="margin-top:12px">
    <div>Dit navn:</div>
    <input id="nameInput" type="text" placeholder="Skriv dit navn">
    <br><br>
    <div>Interval til næste pause:</div>
    <button class="intervalBtn" data-int="30">30 sek</button>
    <button class="intervalBtn" data-int="1500">25 min</button>
    <button class="intervalBtn" data-int="1800">30 min</button>
    <button class="intervalBtn" data-int="2400">40 min</button>
    <br><br>
    <div>Varighed (energipause):</div>
    <button class="timeBtn" data-time="30">30 sek</button>
    <button class="timeBtn" data-time="60">1 min</button>
    <button class="timeBtn" data-time="120">2 min</button>
  </div>
</details>

<script>
// ⭐ Worker URL
const WORKER_URL = "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev";
const api = (p) => WORKER_URL.replace(/\/+$/,"") + p;

// ⭐ UI refs
const nameInput = document.getElementById("nameInput");
const welcomeName = document.getElementById("welcomeName");
const exerciseBtns = document.querySelectorAll(".exerciseBtn");
const timeBtns = document.querySelectorAll(".timeBtn");
const intervalBtns = document.querySelectorAll(".intervalBtn");
const timerEl = document.getElementById("timer");
const chosenExerciseDisplay = document.getElementById("chosenExerciseDisplay");
const finishBtn = document.getElementById("finishBtn");
const thanks = document.getElementById("thanks");
const teamStats = document.getElementById("teamStats");
const statTotal = document.getElementById("statTotal");
const latestList = document.getElementById("latestList");

// ⭐ State
let chosenExercise = "random";
let chosenTime = Number(localStorage.getItem("time") || 60);
let chosenInterval = Number(localStorage.getItem("interval") || 1500); // default 25 min
let timerId = null;
let pauseStart = null;
let latestFeedCache = [];

// ⭐ Notification permission
if (Notification.permission === "default") {
  Notification.requestPermission();
}

// ⭐ Load name
nameInput.value = localStorage.getItem("name") || "";
welcomeName.textContent = nameInput.value || "ven";
nameInput.oninput = () => {
  localStorage.setItem("name", nameInput.value);
  welcomeName.textContent = nameInput.value || "ven";
};

// ⭐ Load interval buttons
intervalBtns.forEach(btn => {
  if (Number(btn.dataset.int) === chosenInterval) btn.classList.add("active");
  btn.onclick = () => {
    intervalBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    chosenInterval = Number(btn.dataset.int);
    localStorage.setItem("interval", chosenInterval);
  };
});

// ⭐ Load time buttons
timeBtns.forEach(btn => {
  if (Number(btn.dataset.time) === chosenTime) btn.classList.add("active");
  btn.onclick = () => {
    timeBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    chosenTime = Number(btn.dataset.time);
    localStorage.setItem("time", chosenTime);
  };
});

// ⭐ Exercise buttons
exerciseBtns.forEach(btn => {
  btn.onclick = () => {
    exerciseBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    if (btn.dataset.ex === "random") {
      const list = ["Armstræk","Squats","Stræk"];
      chosenExercise = list[Math.floor(Math.random()*list.length)];
    } else {
      chosenExercise = btn.dataset.ex;
    }

    chosenExerciseDisplay.textContent = "";
    startTimer();
  };
});

// ⭐ Timer
function startTimer() {
  thanks.style.display = "none";
  teamStats.style.display = "none";

  let s = chosenTime;
  pauseStart = Date.now();

  timerEl.textContent = format(s);

  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    timerEl.textContent = format(s);
    if (s-- <= 0) finishPause();
  }, 1000);
}

function format(sec) {
  const m = sec / 60 | 0;
  const s = sec % 60;
  return `${m} min ${String(s).padStart(2,'0')} sek`;
}

finishBtn.onclick = finishPause;

// ⭐ Microfeedback: næste pause tidspunkt
function nextPauseTime() {
  const t = new Date(Date.now() + chosenInterval * 1000);
  const hh = String(t.getHours()).padStart(2, "0");
  const mm = String(t.getMinutes()).padStart(2, "0");
  return `${hh}.${mm}`;
}

// ⭐ OS-notifikation
function scheduleNotification() {
  if (Notification.permission !== "granted") return;

  setTimeout(() => {
    new Notification("Tid til en ny energipause ✨", {
      body: "Vil du lade op igen?",
      icon: "icon.png"
    });
  }, chosenInterval * 1000);
}

// ⭐ Finish pause
async function finishPause() {
  clearInterval(timerId);
  timerId = null;

  const duration = Math.round((Date.now() - pauseStart) / 1000);

  const payload = {
    team_id: new URLSearchParams(location.search).get("team") || "default",
    name: nameInput.value || "Ukendt",
    exercise: chosenExercise,
    duration
  };

  await fetch(api("/event"), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload),
    cache:"no-store"
  });

  await loadFeed();

  // ⭐ Microfeedback
  const nextTime = nextPauseTime();
  thanks.textContent = `Godt gået! 🙌\nNæste pause er kl. ${nextTime}`;
  thanks.style.display = "block";

  // ⭐ OS-notifikation
  localStorage.setItem("lastPause", Date.now());
  scheduleNotification();

  showFeedback();
}

// ⭐ Emoji map
const emojiMap = {
  "Armstræk": "💪",
  "Squats": "🦵",
  "Stræk": "🤸"
};

// ⭐ Feedback + stats
function showFeedback() {
  const items = latestFeedCache || [];
  const total = items.length;

  const latest = {};
  items.forEach(i => {
    if (!latest[i.name] || i.ts > latest[i.name].ts) latest[i.name] = i;
  });

  statTotal.textContent = `I har ladt op med i alt ${total} energipauser`;

  let list = "";
  Object.values(latest)
    .sort((a,b)=>b.ts - a.ts)
    .forEach(i => {
      const emoji = emojiMap[i.exercise] || "✨";
      list += `${emoji} ${i.name}: ${i.exercise}\n`;
    });

  latestList.textContent = list;
  teamStats.style.display = "block";
}

// ⭐ Load feed
async function loadFeed() {
  const team = new URLSearchParams(location.search).get("team") || "default";
  const res = await fetch(api("/feed?team=" + team), { cache:"no-store" });
  const data = await res.json();
  latestFeedCache = data.feed || [];
}

setInterval(loadFeed, 3000);
loadFeed();
</script>

</body>
</html>
