<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v190</title>

<style>
body{font-family:system-ui;padding:16px;max-width:720px;margin:auto}
.hidden{display:none}
#img{max-width:200px;margin-top:10px;display:block}
#feed{margin-top:20px;font-size:.95rem;color:#444}
#micro{margin-top:12px;color:green}
button{cursor:pointer}
.small{font-size:.85rem;color:#666}
hr{opacity:.25;margin:18px 0}
#step1-line{display:flex;align-items:center;gap:12px}
.footer-big{font-size:1rem;font-weight:500;margin-top:20px}
</style>
</head>

<body>

<h2 id="greeting">Klar til en energipause, <span id="nameLabel"></span>?</h2>

<hr>

<div id="step1-line">
  <p><strong>1.</strong></p>
  <button id="start">Start 2 min timer</button>
  <div id="count" class="hidden">2:00</div>
</div>

<hr>

<p id="title">
  <strong>2.</strong> <span id="activityName"></span>. I dit eget tempo.
</p>

<img id="img" class="hidden" alt="">

<hr>

<!-- ⭐ Punkt 3 – energimåling -->
<div id="steps">
  <p><strong>3.</strong> Hvordan føles din energi efter pausen?</p>
</div>

<div id="energy" class="hidden" aria-live="polite">
  <button data-v="større">Større</button>
  <button data-v="samme">Samme</button>
  <button data-v="mindre">Mindre</button>
  <button data-v="ved_ikke">Ved ikke</button>
</div>

<hr>

<div id="micro" class="hidden" role="status"></div>

<hr>

<h3>Dit teams seneste energipauser:</h3>
<div id="feed">Indlæser…</div>

<hr>

<!-- ⭐ Indstillinger -->
<h3>Indstillinger</h3>
<label for="reminderInput">Påmindelsesinterval (minutter):</label>
<input id="reminderInput" type="number" min="5" max="180" value="25" style="width:80px;">
<button id="saveReminder">Gem</button>

<p id="nextPauseDisplay" style="margin-top:10px;font-weight:500;"></p>

<hr>

<p class="footer-big">
  Flow Focus – Korte energipauser til at støtte dit fokus og velvære.
</p>

<script>
/* ---------- AUTOJOIN ---------- */
const p = new URLSearchParams(location.search);
if (p.get("team")) localStorage.setItem("team", p.get("team"));
if (p.get("name")) localStorage.setItem("name", p.get("name"));
if (p.get("org"))  localStorage.setItem("org",  p.get("org"));

const TEAM = (localStorage.getItem("team") || "demo").trim();
const NAME = (localStorage.getItem("name") || "Ukendt").trim();
const ORG  = (localStorage.getItem("org")  || "default_org").trim();

/* ---------- DEVICE-ID ---------- */
let DEVICE = localStorage.getItem("device_id");
if (!DEVICE) {
  DEVICE = "dev_" + (crypto.randomUUID ? crypto.randomUUID().slice(0,12) : Math.random().toString(36).slice(2,14));
  localStorage.setItem("device_id", DEVICE);
}

/* ---------- HELPERS ---------- */
function $(id){ return document.getElementById(id) }
function escapeHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

/* ---------- REMINDER STATE ---------- */
let reminderInterval = localStorage.getItem("reminderInterval")
  ? parseInt(localStorage.getItem("reminderInterval"), 10)
  : 25;

let lastPauseTime = localStorage.getItem("lastPauseTime")
  ? new Date(localStorage.getItem("lastPauseTime"))
  : null;

let reminderTimeoutId = null;

/* ---------- FUNCTIONS ---------- */
function getReminderInterval() {
  return reminderInterval;
}

function nextPauseTime() {
  if (!lastPauseTime) return "";
  const d = new Date(lastPauseTime);
  d.setMinutes(d.getMinutes() + getReminderInterval());
  return d.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
}

function updateNextPauseDisplay() {
  const t = nextPauseTime();
  document.getElementById("nextPauseDisplay").textContent =
    t ? `Næste pause kl. ${t}` : "";
}

function sendOSNotification(time) {
  if (Notification.permission === "granted") {
    new Notification("Flow Focus", {
      body: `Tid til en ny energipause (${time})`,
      icon: "icon.png"
    });
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(p => {
      if (p === "granted") sendOSNotification(time);
    });
  }
}

function scheduleReminder() {
  if (!lastPauseTime) return;

  if (reminderTimeoutId) {
    clearTimeout(reminderTimeoutId);
  }

  const d = new Date(lastPauseTime);
  d.setMinutes(d.getMinutes() + getReminderInterval());
  const ms = d.getTime() - Date.now();

  reminderTimeoutId = setTimeout(() => {
    sendOSNotification(nextPauseTime());
  }, ms);
}

/* ---------- ELEMENTS ---------- */
const activityNameEl = document.getElementById("activityName");
const img = $("img");
const start = $("start");
const count = $("count");
const energy = $("energy");
const micro = $("micro");
const feed = $("feed");

/* ---------- ACTIVITIES ---------- */
const acts = [
  { t: "Lægløft", i: "images/laegloeft.png" },
  { t: "Squats", i: "images/squats.png" },
  { t: "Armcirkler", i: "images/armcirkel.png" }
];

function showAct(){
  const a = acts[Math.random()*acts.length | 0];
  activityNameEl.textContent = a.t;
  img.src = a.i;
  img.alt = a.t;
  img.classList.remove("hidden");
  count.classList.add("hidden");
  micro.classList.add("hidden");
  energy.classList.remove("hidden");
}

/* ---------- TIMER ---------- */
function startTimer(){
  start.disabled = true;
  let s = 120;
  count.classList.remove("hidden");
  const upd = () => count.textContent = `${(s/60|0)}:${String(s%60).padStart(2,"0")}`;
  upd();
  timer = setInterval(() => {
    s--;
    upd();
    if (s <= 0) {
      clearInterval(timer);
      start.disabled = false;
      new Audio("done.mp3").play();
    }
  }, 1000);
}

/* ---------- SEND EVENT ---------- */
async function complete(v){
  lastPauseTime = new Date();
  localStorage.setItem("lastPauseTime", lastPauseTime.toISOString());

  const now = lastPauseTime.toISOString();

  const payload = {
    id: crypto.randomUUID ? crypto.randomUUID() : ("id_"+Math.random().toString(36).slice(2,10)),
    device_id: DEVICE,
    display_name: NAME,
    team_id: TEAM,
    org_id: ORG,
    activity: activityNameEl.textContent,
    energy: v,
    timestamp: now
  };

  const r = await api("/api/event", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  if (!r.ok) {
    micro.classList.remove("hidden");
    micro.textContent = "Der skete en fejl – prøv igen om lidt.";
    return;
  }

  const nextTime = nextPauseTime();
  micro.classList.remove("hidden");
  micro.textContent = `Energipause registreret. Du får en reminder om næste pause kl. ${nextTime}.`;

  updateNextPauseDisplay();
  scheduleReminder();
  await loadFeed();
}

/* ---------- TEAM FEED ---------- */
async function loadFeed(){
  feed.textContent = "Indlæser…";
  const r = await api(`/api/team_feed?team_id=${encodeURIComponent(TEAM)}&limit=50`);
  if (!r.ok) {
    feed.textContent = "Kunne ikke hente feed.";
    return;
  }

  const rows = r.body;
  if (!Array.isArray(rows) || rows.length === 0) {
    feed.textContent = "Ingen energipauser endnu.";
    return;
  }

  const latest = {};

  rows.forEach(rw => {
    const name = escapeHtml(rw.display_name || "Ukendt");
    const act = escapeHtml(rw.activity || "Aktivitet");
    if (!latest[name]) latest[name] = act;
  });

  feed.innerHTML = Object.entries(latest)
    .map(([name, act]) => `${name}: ${act}`)
    .join("<br>");
}

/* ---------- EVENT LISTENERS ---------- */
start.addEventListener("click", () => {
  showAct();
  startTimer();
});

document.querySelectorAll("#energy button").forEach(btn => {
  btn.addEventListener("click", async () => {
    const v = btn.getAttribute("data-v");
    document.querySelectorAll("#energy button").forEach(b => b.disabled = true);
    await complete(v);
    setTimeout(() => {
      document.querySelectorAll("#energy button").forEach(b => b.disabled = false);
    }, 800);
  });
});

document.getElementById("saveReminder").addEventListener("click", () => {
  const v = parseInt(document.getElementById("reminderInput").value, 10);
  if (v >= 5 && v <= 180) {
    localStorage.setItem("reminderInterval", v);
    reminderInterval = v;

    updateNextPauseDisplay();

    if (lastPauseTime) {
      const t = nextPauseTime();
      micro.textContent = `Energipause registreret. Du får en reminder om næste pause kl. ${t}.`;
      scheduleReminder();
    }

    alert(`Påmindelsesinterval gemt: ${v} min`);
  }
});

/* ---------- INIT ---------- */
window.addEventListener("load", async () => {
  document.getElementById("nameLabel").textContent = NAME;

  document.getElementById("reminderInput").value = getReminderInterval();
  updateNextPauseDisplay();

  showAct();
  await registerDevice();
  await loadFeed();
  setInterval(loadFeed, 15000);
});
</script>

</body>
</html>
