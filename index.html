<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Flow Focus</title>
</head>
<body>

<h1>Hej 👋</h1>

<!-- Flow Focus interaktiv boks -->
<div id="ff-box" hidden>

  <!-- STEP 1: Energi før aktivitet -->
  <div id="ff-step-energy-before">
    <h4>Hvordan er din energi lige nu?</h4>
    <p>Klik et sted på linjen</p>

    <div id="ff-vas-before"
         style="width:100%; height:40px; position:relative; cursor:pointer; margin-bottom:10px;">
    </div>

    <div style="display:flex; justify-content:space-between; font-size:12px;">
      <span>Ingen energi</span>
      <span>Maksimal energi</span>
    </div>
  </div>

  <!-- STEP 2: Aktivitet -->
  <div id="ff-step-activity" hidden>
    <p id="ff-activity-text">Aktivitet: Skulderrul i 20 sek.</p>
    <button id="ff-done-btn">Jeg har gjort det</button>
  </div>

  <!-- STEP 3: Energi efter aktivitet -->
  <div id="ff-step-energy-after" hidden>
    <h4>Hvordan er din energi nu?</h4>
    <p>Klik et sted på linjen</p>

    <div id="ff-vas-after"
         style="width:100%; height:40px; position:relative; cursor:pointer; margin-bottom:10px;">
    </div>

    <div style="display:flex; justify-content:space-between; font-size:12px;">
      <span>Ingen energi</span>
      <span>Maksimal energi</span>
    </div>
  </div>

</div>

<!-- STEP 4: Graf -->
<div id="ff-graph-section" hidden>
  <h3>Energi-effekt af mikropauser over dagen</h3>

  <canvas id="ff-graph" width="600" height="320" style="border:1px solid black;">
