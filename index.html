<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow Focus v86</title>

<style>
  body{font-family:system-ui;margin:0;padding:20px;background:#fff;color:#111}
  button,input{padding:10px 16px;font-size:.95rem;border-radius:8px;border:1px solid #ccc;background:#fafafa;cursor:pointer;margin:4px}
  input{padding:8px}
  .active{background:#111;color:#fff}
  #chosenExerciseDisplay,#timer,#thanks{font-size:18px;margin:4px 0;min-height:20px}
  .subheader{font-weight:600;margin:16px 0 6px}
  #teamFeed{white-space:pre-line;margin-top:10px}
</style>
</head>
<body>

<!-- ⭐ Velkomst -->
<div id="welcome" style="font-size:20px;font-weight:600;margin-bottom:16px"></div>

<!-- ⭐ Boost-knap -->
<button class="exerciseBtn" data-ex="random" style="display:none;">Ja, jeg er klar</button>

<!-- ⭐ Øvelse + timer -->
<div id="chosenExerciseDisplay"></div>
<div id="timer"></div>

<!-- ⭐ Tak-besked -->
<div id="thanks" style="display:none;margin-top:20px"></div>

<!-- ⭐ Team + indstillinger -->
<details style="margin-top:20px;">
  <summary style="font-weight:600;">Team og Indstillinger</summary>

  <div class="subheader">Team</div>
  <div id="teamFeed">Seneste opladninger:</div>

  <div class="subheader">Indstillinger</div>
  <div style="margin-top:12px">
    <div>Dit navn:</div>
    <input id="nameInput" placeholder="Skriv dit navn"><br><br>

    <div>Interval til næste pause:</div>
    <button class="intervalBtn" data-int="30">30 sek</button>
    <button class="intervalBtn" data-int="1500">25 min</button>
    <button class="intervalBtn" data-int="1800">30 min</button>
    <button class="intervalBtn" data-int="2400">40 min</button>

    <br><br>
    <div>Varighed:</div>
    <button class="timeBtn" data-time="30">30 sek</button>
    <button class="timeBtn" data-time="60">1 min</button>
    <button class="timeBtn" data-time="120">2 min</button>
  </div>
</details>

<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");

const api = p => "https://flowfocus-aa-2704.jakobhelkjaer.workers.dev" + p;
const $ = id => document.getElementById(id);

const nameInput = $("nameInput"), welcome = $("welcome"), timerEl = $("timer"),
      chosenExerciseDisplay = $("chosenExerciseDisplay"), thanks = $("thanks"),
      startBtn = document.querySelector(".exerciseBtn"), teamFeed = $("teamFeed");

let chosenExercise="random",
    chosenTime=+localStorage.time||60,
    chosenInterval=+localStorage.interval||1500,
    timerId=null, pauseStart=null, reminderTimeoutId=null, nextPauseTimestamp=0;

const team = new URLSearchParams(location.search).get("team") || "default";

async function loadProfileName(){
  const localName = localStorage.name || "";
  const data = await (await fetch(api(`/profile?team=${team}&name=${localName}`))).json();
  const profileName = data.name || localName || "Ukendt";
  nameInput.value = profileName;
  welcome.textContent = `Brug for et energiboost, ${profileName}?`;
}

async function saveProfileName(name){
  await fetch(api("/profile"), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ team_id:team, name })
  });
}

nameInput.oninput = () => {
  localStorage.name = nameInput.value;
  welcome.textContent = `Brug for et energiboost, ${nameInput.value}?`;
  saveProfileName(nameInput.value);
};

function bindButtons(selector, stateKey, callback){
  document.querySelectorAll(selector).forEach(btn=>{
    const val = btn.dataset.ex || btn.dataset.time || btn.dataset.int;
    if (+val === window[stateKey]) btn.classList.add("active");

    btn.onclick = () => {
      document.querySelectorAll(selector).forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");

      if(selector !== ".exerciseBtn"){
        window[stateKey] = +val;
        localStorage[stateKey.replace("chosen","").toLowerCase()] = +val;
      }
      callback && callback(btn);
    };
  });
}

bindButtons(".intervalBtn","chosenInterval");
bindButtons(".timeBtn","chosenTime");
bindButtons(".exerciseBtn","chosenExercise",()=>{
  startBtn.style.display="none";
  startNewPause();
});

function startNewPause(){
  thanks.style.display="none";
  const list=["Squats","Knæløft","Armsving"];
  chosenExercise = list[Math.floor(Math.random()*list.length)];

  // ⭐ Hel 86: boost-tekst + øvelse + "i:"
  chosenExerciseDisplay.textContent = `Få et boost ved at lave ${chosenExercise} i:`;

  startTimer();
}

function scheduleReminder(){
  if(Notification.permission!=="granted") return;
  reminderTimeoutId = setTimeout(()=>new Notification("Tid til et energiboost"), chosenInterval*1000);
}

function rescheduleReminder(){
  if(reminderTimeoutId) clearTimeout(reminderTimeoutId);
  scheduleReminder();
}

function startTimer(){
  let s = chosenTime;
  pauseStart = Date.now();
  timerEl.textContent = format(s);
  nextPauseTimestamp = Date.now() + (chosenTime + chosenInterval)*1000;

  clearInterval(timerId);
  timerId = setInterval(()=>{
    timerEl.textContent = format(s);
    if(s-- <= 0){
      new Audio("done.mp3").play();
      clearInterval(timerId);
      timerEl.textContent="";
      chosenExerciseDisplay.textContent="";
      finishPause();
    }
  },1000);
}

const format = sec => `${(sec/60|0)} min ${String(sec%60).padStart(2,'0')} sek`;

async function refreshFeed(){
  const data = await (await fetch(api(`/feed?team=${team}`))).json();
  const latest = {};

  (data.feed||[]).forEach(i=>{
    const ts = +i.ts*1000;
    if(!latest[i.name] || ts > latest[i.name].ts) latest[i.name] = {...i, ts};
  });

  teamFeed.textContent = "Seneste opladninger:\n" +
    Object.values(latest)
      .sort((a,b)=>b.ts-a.ts)
      .map(i=>{
        const d=new Date(i.ts), n=new Date();
        const day = d.toDateString()===n.toDateString()
          ? "I dag"
          : d.toLocaleDateString("da-DK",{day:"numeric",month:"long"});
        const time = d.toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"});
        return `${day} kl. ${time} ${i.name}: ${i.exercise}`;
      }).join("\n");
}

async function finishPause(){
  const duration = Math.round((Date.now()-pauseStart)/1000);
  nextPauseTimestamp = Date.now() + chosenInterval*1000;
  rescheduleReminder();

  await fetch(api("/event"),{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ team_id:team, name:nameInput.value||"Ukendt", exercise:chosenExercise, duration })
  });

  await refreshFeed();

  thanks.textContent = `Boost færdigt. Næste er kl. ${
    new Date(nextPauseTimestamp).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})
  }`;
  thanks.style.display="block";
}

setInterval(()=>startBtn.style.display = Date.now()>=nextPauseTimestamp ? "inline-block" : "none",1000);
setInterval(refreshFeed,3000);

loadProfileName();
refreshFeed();
</script>
</body>
</html>
